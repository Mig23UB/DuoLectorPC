<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="DuoLector — El espacio de tu pareja">
  <title>DuoLector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<script src="https://www.paypal.com/sdk/js?client-id=BAAVuIwcp8S2CCNpefKiYp1A1U9YtBxpy6cWO4i9YYD4B0pRzbJoc7-zuKwd1TN4OEyVhV3UK8-FNnNqtE&components=hosted-buttons&disable-funding=venmo&currency=USD"></script>
<style>
/* ══════════════════════════════════════════════════════════
   DUOLECTOR — MAIN CSS
   Dark: Starry night | Light: Winter dawn (Izhevsk)
   ══════════════════════════════════════════════════════════ */
:root {
  --bg:#05060f;--bg2:#080a14;--surface:#0d0f1e;--surface2:#121528;
  --card:#161928;--card2:#1c2035;
  --border:rgba(160,170,255,.07);--border2:rgba(160,170,255,.13);
  --glass2:rgba(5,6,15,.95);
  --text:#eeeaf8;--text2:#a8a4c0;--muted:#585478;--dim:#2a2845;
  --amber:#e8a84a;--amber-s:rgba(232,168,74,.13);
  --rose:#e07890;--rose-s:rgba(224,120,144,.13);
  --ice:#7ec8e3;--mint:#70c8a0;--lav:#a78bfa;
  --topbar-h:56px;--bnav-h:64px;--sidebar-w:240px;
  --r:16px;--r-sm:10px;--r-lg:24px;
  --shadow:0 4px 24px rgba(0,0,0,.6);--shadow-lg:0 8px 48px rgba(0,0,0,.75);
}
[data-theme="light"] {
  --bg:#f5ede8;--bg2:#ede3dc;--surface:#e8dcd4;--surface2:#dfd3c8;
  --card:#fff8f4;--card2:#fdf0e8;
  --border:rgba(180,120,80,.1);--border2:rgba(180,120,80,.18);
  --glass2:rgba(255,248,244,.96);
  --text:#2a1a10;--text2:#6b4a38;--muted:#b08878;--dim:#e0cfc4;
  --amber:#c8640a;--amber-s:rgba(200,100,10,.12);
  --rose:#c0405a;--rose-s:rgba(192,64,90,.12);
  --ice:#5890b0;--mint:#3a8860;--lav:#7060c0;
  --shadow:0 4px 24px rgba(100,60,20,.15);--shadow-lg:0 8px 48px rgba(100,60,20,.25);
}

/* ── Starry night background ── */
body::before {
  content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 60%,rgba(80,60,180,.15) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(40,160,120,.1) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 100%,rgba(120,60,160,.08) 0%,transparent 40%);
  transition:opacity .5s;
}
[data-theme="light"] body::before { opacity:0; }

#stars-canvas { position:fixed;inset:0;z-index:-1;pointer-events:none;transition:opacity .6s; }
[data-theme="light"] #stars-canvas { opacity:0; }

/* ── Winter dawn background (light mode) ── */
body::after {
  content:'';position:fixed;inset:0;z-index:-2;opacity:0;pointer-events:none;
  background:
    radial-gradient(ellipse at 50% 70%,rgba(255,180,80,.35) 0%,rgba(255,140,60,.2) 30%,transparent 65%),
    radial-gradient(ellipse at 50% 100%,rgba(240,200,160,.5) 0%,transparent 50%),
    linear-gradient(180deg,rgba(200,180,220,.3) 0%,rgba(255,220,180,.4) 40%,rgba(255,190,130,.5) 70%,rgba(240,210,170,.6) 100%);
  transition:opacity .5s;
}
[data-theme="light"] body::after { opacity:1; }

/* ── Snow particles (light mode) ── */
.snow { position:fixed;top:-10px;z-index:0;pointer-events:none;color:rgba(255,255,255,.8);
  animation:snowfall linear infinite;display:none; }
[data-theme="light"] .snow { display:block; }
@keyframes snowfall { 0%{transform:translateY(0) rotate(0);opacity:.8} 100%{transform:translateY(100vh) rotate(360deg);opacity:0} }

/* ── Reset ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;font-size:15px;background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit;background:none;border:none;outline:none}
a{text-decoration:none;color:inherit;cursor:pointer}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:4px}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100svh;background:var(--bg);overflow:hidden}
#topbar{height:var(--topbar-h);background:var(--glass2);backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;z-index:50}
.tb-menu-btn{display:flex!important}
.tb-center{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;min-width:0}
.tb-logo{height:28px;width:28px;object-fit:contain;border-radius:8px;flex-shrink:0}
.tb-title{font-family:'Cormorant Garamond',serif;font-size:1.25rem;font-weight:500;letter-spacing:.02em;white-space:nowrap}
.tb-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.tb-days{font-size:.72rem;font-weight:600;color:var(--mint);padding:3px 7px;border-radius:8px;
  background:rgba(112,200,160,.13);cursor:pointer;transition:all .2s;white-space:nowrap}
.tb-days:hover{background:rgba(112,200,160,.22)}
.tb-km{font-size:.72rem;font-weight:600;color:var(--ice);padding:3px 8px;border-radius:8px;
  background:rgba(126,200,227,.13);cursor:pointer;transition:all .2s;white-space:nowrap;letter-spacing:.02em}
.tb-km:hover{background:rgba(126,200,227,.22)}
.tb-icon-btn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:all .2s;flex-shrink:0}
.tb-icon-btn:hover{background:var(--surface2);color:var(--text)}
.notif-wrap{position:relative}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;
  background:var(--rose);border:1.5px solid var(--bg);display:none}

/* ── Mini music topbar ── */
.mp-topbar{display:none;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:3px 8px 3px 5px;max-width:150px;overflow:hidden;position:relative}
.mp-mini-note{font-size:.8rem;flex-shrink:0}
.mp-mini-title{font-size:.62rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;max-width:72px}
.mp-mini-btn{width:20px;height:20px;background:var(--amber);border-radius:50%;display:flex;align-items:center;
  justify-content:center;color:#000;flex-shrink:0;font-size:.55rem;cursor:pointer}
.mp-mini-close{width:16px;height:16px;border-radius:50%;background:var(--surface);border:1px solid var(--border2);
  color:var(--muted);font-size:.55rem;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;padding:0;line-height:1;transition:all .18s}
.mp-mini-close:hover{background:rgba(220,60,60,.2);color:#e06060}
.mp-mini-progress-wrap{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--border)}
.mp-mini-bar{height:100%;background:var(--amber);border-radius:2px;transition:width .5s linear}

/* ── App body ── */
#app-body{flex:1;display:flex;overflow:hidden}
#desktop-sidebar{display:none;width:var(--sidebar-w);flex-shrink:0;background:var(--surface);
  border-right:1px solid var(--border);overflow-y:auto;flex-direction:column}
#main-content{flex:1;overflow:hidden;position:relative;background:var(--bg)}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;
  padding-bottom:calc(var(--bnav-h) + 8px)}
.page.active{display:block;animation:slideIn .28s cubic-bezier(.23,1,.32,1)}
#bottom-nav{height:var(--bnav-h);background:var(--glass2);backdrop-filter:blur(30px) saturate(200%);
  border-top:1px solid var(--border);display:flex;align-items:stretch;flex-shrink:0;z-index:50}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;color:var(--muted);transition:all .2s;padding-top:6px}
.bnav-btn svg{width:22px;height:22px;transition:all .25s}
.bnav-btn span{font-size:.62rem;font-weight:500}
.bnav-btn.active{color:var(--amber)}
.bnav-btn.active svg{transform:translateY(-2px);filter:drop-shadow(0 0 6px var(--amber))}

/* ── Desktop ── */
@media(min-width:768px){
  body{background:var(--bg2)}
  #app{max-width:1200px;margin:0 auto}
  #desktop-sidebar{display:flex}
  .tb-menu-btn{display:flex!important}
  #bottom-nav{display:none}
  .page{padding-bottom:16px}
  #sidebar-overlay,#sidebar{display:none!important}
}
@media(min-width:1024px){#app{max-width:1400px}#desktop-sidebar{width:260px}}

/* ── Utilities ── */
.display{font-family:'Cormorant Garamond',serif}
.hw{font-family:'Caveat',cursive}
.page-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;padding:24px 20px 4px;line-height:1.1}
.page-sub{font-size:.8rem;color:var(--muted);padding:0 20px 20px;font-weight:300}
.section-label{font-size:.65rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:16px 20px 8px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin:0 16px 12px}
.btn{height:44px;border-radius:var(--r-sm);padding:0 20px;font-size:.88rem;font-weight:500;
  display:inline-flex;align-items:center;justify-content:center;gap:7px;transition:all .2s;cursor:pointer}
.btn-primary{background:var(--amber);color:#000;box-shadow:0 4px 20px rgba(232,168,74,.3)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-ghost:hover{background:var(--surface2)}
.btn-danger{background:rgba(220,60,60,.12);border:1px solid rgba(220,60,60,.25);color:#e06060}
.btn-sm{height:34px;padding:0 14px;font-size:.8rem}
.btn-full{width:100%}
.input-field{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);
  padding:12px 14px;color:var(--text);font-size:.9rem;transition:border-color .2s}
.input-field:focus{border-color:var(--amber);outline:none}
.input-field::placeholder{color:var(--muted)}
.input-label{display:block;font-size:.73rem;font-weight:500;color:var(--text2);margin-bottom:6px}
.form-group{margin-bottom:16px}
.spinner{width:24px;height:24px;border:2px solid var(--dim);border-top-color:var(--amber);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
.toast{position:fixed;bottom:calc(var(--bnav-h)+16px);left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card2);color:var(--text);padding:10px 20px;border-radius:50px;font-size:.82rem;
  font-weight:500;box-shadow:var(--shadow-lg);border:1px solid var(--border2);opacity:0;
  transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:88%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){.toast{bottom:24px}}

/* ── Auth screens ── */
.auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;
  justify-content:center;z-index:900;overflow-y:auto;padding:20px}
.auth-card{position:relative;z-index:1;background:var(--glass2);backdrop-filter:blur(40px) saturate(200%);
  border:1px solid var(--border2);border-radius:var(--r-lg);padding:40px 32px;
  width:min(400px,100%);box-shadow:var(--shadow-lg)}
.auth-logo{width:64px;height:64px;object-fit:contain;border-radius:18px;margin:0 auto 16px}
.auth-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;text-align:center;margin-bottom:4px}
.auth-sub{font-size:.8rem;color:var(--muted);text-align:center;margin-bottom:28px}
.auth-tabs{display:flex;gap:4px;background:var(--surface);border-radius:var(--r-sm);padding:4px;margin-bottom:24px}
.auth-tab{flex:1;padding:8px;border-radius:8px;font-size:.82rem;font-weight:500;color:var(--muted);
  transition:all .2s;text-align:center;cursor:pointer}
.auth-tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.auth-divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--muted);font-size:.75rem}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.google-btn{width:100%;height:44px;border-radius:var(--r-sm);border:1.5px solid var(--border2);
  background:var(--surface);display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:.88rem;font-weight:500;transition:all .2s;cursor:pointer}
.google-btn:hover{background:var(--surface2)}
.auth-error{background:rgba(220,60,60,.1);border:1px solid rgba(220,60,60,.25);color:#e07070;
  border-radius:var(--r-sm);padding:10px 14px;font-size:.8rem;margin-bottom:12px;display:none}
.auth-error.show{display:block}
.auth-footer{text-align:center;font-family:'Caveat',cursive;font-size:1rem;color:var(--muted);margin-top:20px}
.couple-setup-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;
  justify-content:center;z-index:850;padding:20px;overflow-y:auto}
.couple-card{background:var(--card);border:1px solid var(--border2);border-radius:var(--r-lg);
  padding:32px;width:min(480px,100%);box-shadow:var(--shadow-lg)}
.couple-tabs,.couple-tab{display:flex;gap:4px;background:var(--surface);border-radius:var(--r-sm);padding:4px;margin-bottom:24px}
.couple-tab{flex:1;padding:8px;border-radius:8px;font-size:.82rem;font-weight:500;color:var(--muted);transition:all .2s;text-align:center;cursor:pointer}
.couple-tab.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin:8px 0 16px}
.emoji-opt{aspect-ratio:1;background:var(--surface);border:2px solid var(--border);border-radius:8px;
  display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:all .18s}
.emoji-opt:hover,.emoji-opt.selected{border-color:var(--amber);background:var(--amber-s)}
.invite-code-display{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:12px 16px;text-align:center;font-family:'Caveat',cursive;font-size:1.8rem;letter-spacing:.2em;color:var(--amber);margin:12px 0}
.toggle-wrap{position:relative;display:inline-flex;align-items:center}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute}
.toggle-label{display:block;width:44px;height:24px;background:var(--dim);border-radius:12px;cursor:pointer;transition:background .25s;position:relative}
.toggle-label::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .25s}
.toggle-wrap input:checked+.toggle-label{background:var(--amber)}
.toggle-wrap input:checked+.toggle-label::after{transform:translateX(20px)}
.loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000}
.ls-content{display:flex;flex-direction:column;align-items:center;gap:16px}
.ls-name{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;letter-spacing:.08em}
.ls-dots{display:flex;gap:8px}
.ls-dots span{width:6px;height:6px;border-radius:50%;background:var(--amber);animation:dot-pulse 1.2s ease-in-out infinite}
.ls-dots span:nth-child(2){animation-delay:.2s}
.ls-dots span:nth-child(3){animation-delay:.4s}

/* ── Sidebar (mobile overlay) ── */
#sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199;opacity:0;pointer-events:none;transition:opacity .28s}
#sidebar-overlay.on{opacity:1;pointer-events:auto}
#sidebar{position:fixed;top:0;left:0;bottom:0;width:min(var(--sidebar-w),85vw);background:var(--surface);border-right:1px solid var(--border);z-index:200;transform:translateX(-100%);transition:transform .28s cubic-bezier(.23,1,.32,1);display:flex;flex-direction:column;overflow-y:auto}
#sidebar.on{transform:translateX(0)}
.sb-head{display:flex;align-items:center;gap:8px;padding:16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-head .tb-icon-btn{margin-left:auto}
.sb-user-card{display:flex;align-items:center;gap:10px;padding:12px;background:var(--card);border-radius:var(--r);border:1px solid var(--border);margin-bottom:8px}
.sb-user-emoji{font-size:1.5rem;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--surface2);border-radius:10px;flex-shrink:0}
.sb-user-name{font-weight:600;font-size:.88rem}
.sb-user-role{font-size:.72rem;color:var(--muted)}
.sb-days-box{background:linear-gradient(135deg,var(--amber-s),var(--rose-s));border:1px solid rgba(232,168,74,.25);border-radius:var(--r);padding:10px 14px;display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sb-days-num{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;color:var(--amber);line-height:1}
.sb-days-sub{font-size:.75rem;color:var(--text2)}
.sb-label{font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:12px 12px 4px}
.sb-nav{flex:1}
.sb-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--text2);font-size:.875rem;transition:all .18s;margin:1px 8px;cursor:pointer}
.sb-link:hover,.sb-link.active{background:var(--card);color:var(--text)}
.sb-link.active{color:var(--amber)}
.sb-ico{width:20px;text-align:center;font-size:1rem}
.sb-foot{padding:12px;border-top:1px solid var(--border);flex-shrink:0}
.sb-logout-btn{width:100%;padding:9px;background:rgba(220,60,60,.1);border:1px solid rgba(220,60,60,.2);border-radius:var(--r-sm);color:#e06060;font-size:.8rem;font-weight:500;margin-bottom:8px;cursor:pointer}
.sb-version{text-align:center;font-size:.65rem;color:var(--muted)}

/* ── Modal ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:300;display:none;align-items:center;justify-content:center;padding:20px}
#modal-overlay.on{display:flex}
.modal-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--r-lg);width:min(420px,100%);max-height:85svh;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);animation:popIn .25s cubic-bezier(.23,1,.32,1)}
.modal-handle-bar{width:36px;height:4px;background:var(--dim);border-radius:2px;margin:12px auto 0}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:400}
.modal-body{padding:0 20px 16px;overflow-y:auto;flex:1}
.modal-foot{padding:12px 20px 16px;border-top:1px solid var(--border)}

/* ── Notifications ── */
#notif-panel{position:fixed;top:calc(var(--topbar-h) + 8px);right:12px;width:min(320px,calc(100vw - 24px));background:var(--card2);border:1px solid var(--border2);border-radius:var(--r-lg);box-shadow:var(--shadow-lg);z-index:150;display:none;overflow:hidden;animation:popIn .22s cubic-bezier(.23,1,.32,1)}
#notif-panel.on{display:block}
.notif-head{padding:14px 16px 10px;font-size:.8rem;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border)}
.notif-list{max-height:320px;overflow-y:auto}
.notif-item{display:flex;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);transition:background .15s}
.notif-item:hover{background:var(--surface)}
.notif-icon{font-size:1.2rem;flex-shrink:0}
.notif-text{font-size:.8rem;color:var(--text2);line-height:1.4}
.notif-time{font-size:.68rem;color:var(--muted);margin-top:2px}
.notif-empty{padding:24px;text-align:center;color:var(--muted);font-size:.82rem}

/* ── Music Player ── */
#music-player{position:fixed;bottom:calc(var(--bnav-h) + 12px);left:50%;transform:translateX(-50%);background:var(--glass2);border:1px solid var(--border2);border-radius:60px;padding:8px 12px 8px 8px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-lg);backdrop-filter:blur(30px) saturate(200%);z-index:100;min-width:220px;max-width:88vw;transition:opacity .3s;cursor:grab;user-select:none}
#music-player:active{cursor:grabbing}
.mp-drag{color:var(--muted);font-size:1rem;padding:0 2px;cursor:grab;touch-action:none}
.mp-cover{width:36px;height:36px;border-radius:10px;object-fit:cover;background:var(--surface2);flex-shrink:0}
.mp-info{flex:1;min-width:0;max-width:120px}
.mp-title{font-size:.8rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-artist{font-size:.68rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mp-btn{width:32px;height:32px;background:var(--amber);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#000;flex-shrink:0;transition:all .2s}
.mp-btn:hover{transform:scale(1.08)}
@media (min-width:768px){#music-player{bottom:20px}}

/* ── Toast ── */
.toast{position:fixed;bottom:calc(var(--bnav-h)+16px);left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);color:var(--text);padding:10px 20px;border-radius:50px;font-size:.82rem;font-weight:500;box-shadow:var(--shadow-lg);border:1px solid var(--border2);opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:85%;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:768px){.toast{bottom:24px}}

/* ═══════════════════════════════════════════════════════════
   PAGES CSS — page-specific styles
   ═══════════════════════════════════════════════════════════ */

/* ── HOME ── */
.home-hero {
  background: linear-gradient(160deg, var(--surface) 0%, var(--bg2) 100%);
  border-bottom: 1px solid var(--border);
  padding: 24px 20px 20px;
  position: relative;
  overflow: hidden;
}
.home-hero::before {
  content: '';
  position: absolute; top: -40px; right: -40px;
  width: 180px; height: 180px;
  background: radial-gradient(circle, var(--amber-soft) 0%, transparent 70%);
  pointer-events: none;
}
.home-greeting {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.6rem;
  font-weight: 300;
  margin-bottom: 4px;
}
.home-greeting em { font-style: italic; color: var(--amber); }
.home-sub { font-size: .78rem; color: var(--muted); margin-bottom: 20px; }
.home-clocks {
  display: flex; gap: 10px;
}
.clock-card {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px;
  text-align: center;
}
.clock-flag { font-size: 1.4rem; margin-bottom: 4px; }
.clock-time {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.5rem;
  font-weight: 300;
  color: var(--text);
  letter-spacing: .04em;
}
.clock-label { font-size: .65rem; color: var(--muted); margin-top: 2px; }

/* Countdown widget */
.countdown-card {
  margin: 12px 16px;
  background: linear-gradient(135deg, rgba(232,168,74,.12) 0%, rgba(224,120,144,.08) 100%);
  border: 1px solid rgba(232,168,74,.25);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
  animation: glow-pulse 3s ease-in-out infinite;
}
.countdown-emoji { font-size: 2rem; margin-bottom: 8px; display: block; }
.countdown-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 3.5rem;
  font-weight: 300;
  color: var(--amber);
  line-height: 1;
}
.countdown-unit { font-size: .72rem; color: var(--muted); margin-top: 4px; }
.countdown-label { font-family: 'Caveat', cursive; font-size: 1.1rem; color: var(--text2); margin-top: 6px; }

/* Quick grid */
.quick-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  padding: 8px 16px 0;
}
.qg-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 8px;
  text-align: center;
  cursor: pointer;
  transition: all .2s;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
}
.qg-item:hover { border-color: var(--amber); transform: translateY(-2px); }
.qg-item:active { transform: scale(.95); }
.qg-icon { font-size: 1.5rem; }
.qg-label { font-size: .62rem; color: var(--muted); }

/* Daily quote */
.quote-card {
  margin: 12px 16px;
  background: var(--card);
  border-left: 3px solid var(--rose);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 14px 16px;
}
.quote-text {
  font-family: 'Caveat', cursive;
  font-size: 1.15rem;
  color: var(--text);
  line-height: 1.5;
  margin-bottom: 6px;
}
.quote-author { font-size: .7rem; color: var(--muted); }

/* ── CHAT ── */
.chat-wrap {
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  position: absolute; inset: 0;
  padding-bottom: 0 !important;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.msg {
  max-width: 80%;
  animation: slideUp .25s ease;
}
.msg.mine { align-self: flex-end; }
.msg.theirs { align-self: flex-start; }
.msg-bubble {
  padding: 10px 14px;
  border-radius: 18px;
  font-size: .88rem;
  line-height: 1.5;
  word-break: break-word;
}
.mine .msg-bubble {
  background: var(--amber);
  color: #000;
  border-bottom-right-radius: 4px;
}
.theirs .msg-bubble {
  background: var(--card2);
  color: var(--text);
  border-bottom-left-radius: 4px;
}
.msg-meta {
  font-size: .6rem;
  color: var(--muted);
  padding: 3px 4px 0;
  display: flex; align-items: center; gap: 4px;
}
.mine .msg-meta { justify-content: flex-end; }
.msg-date-divider {
  text-align: center;
  font-size: .68rem;
  color: var(--muted);
  padding: 8px 0;
  font-weight: 500;
}
.chat-input-bar {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  padding: 10px 12px;
  padding-bottom: max(10px, calc(var(--safe-bottom) + 10px));
  border-top: 1px solid var(--border);
  background: var(--glass2);
  backdrop-filter: blur(20px);
  flex-shrink: 0;
}
.chat-textarea {
  flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 10px 16px;
  font-size: .88rem;
  color: var(--text);
  resize: none;
  line-height: 1.4;
  max-height: 120px;
  overflow-y: auto;
  transition: border-color .2s;
}
.chat-textarea:focus { border-color: var(--amber); }
.chat-send-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--amber);
  color: #000;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
  transition: all .2s;
  box-shadow: 0 2px 10px rgba(232,168,74,.4);
}
.chat-send-btn:hover { filter: brightness(1.1); transform: scale(1.05); }
.chat-typing {
  padding: 4px 14px 0;
  font-size: .7rem;
  color: var(--muted);
  height: 20px;
  font-style: italic;
}

/* ── DIARY ── */
.diary-entry-card {
  margin: 0 16px 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all .2s;
}
.diary-entry-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--shadow); }
.dec-header {
  padding: 14px 16px 10px;
  display: flex; align-items: flex-start; justify-content: space-between;
}
.dec-mood { font-size: 1.6rem; }
.dec-meta { text-align: right; }
.dec-date { font-size: .7rem; color: var(--muted); }
.dec-author { font-size: .72rem; font-weight: 600; }
.dec-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.2rem;
  padding: 0 16px 8px;
  color: var(--text);
}
.dec-preview {
  padding: 0 16px 14px;
  font-size: .8rem;
  color: var(--text2);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.dec-tags {
  padding: 0 16px 14px;
  display: flex; flex-wrap: wrap; gap: 6px;
}
.dec-tag {
  background: var(--surface2);
  border-radius: 20px;
  padding: 2px 10px;
  font-size: .65rem;
  color: var(--muted);
}
.diary-full-view {
  padding: 20px 20px 40px;
}
.diary-full-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2rem;
  font-weight: 300;
  margin-bottom: 8px;
}
.diary-full-body {
  font-size: .92rem;
  line-height: 1.8;
  color: var(--text2);
  white-space: pre-wrap;
}
.mood-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px;
  margin: 8px 0 16px;
}
.mood-opt {
  aspect-ratio: 1;
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px;
  cursor: pointer;
  transition: all .2s;
  font-size: .9rem;
}
.mood-opt:hover { border-color: var(--amber); }
.mood-opt.selected { border-color: var(--amber); background: var(--amber-soft); }
.mood-label { font-size: .55rem; color: var(--muted); }

/* ── LIBRARY / READER ── */
.book-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 8px 16px 0;
}
.book-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all .22s;
}
.book-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--border2); }
.book-cover {
  aspect-ratio: 2/3;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.5rem;
  position: relative;
  overflow: hidden;
}
.book-cover img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
.book-progress-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 4px; background: var(--surface);
}
.book-progress-fill { height: 100%; background: var(--amber); }
.book-info { padding: 10px; }
.book-title { font-size: .85rem; font-weight: 600; margin-bottom: 2px; line-height: 1.3; }
.book-author { font-size: .7rem; color: var(--muted); }
.book-badge {
  position: absolute; top: 8px; right: 8px;
  background: var(--amber);
  color: #000;
  font-size: .55rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 6px;
}

/* Reader layout */
.reader-wrap {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  padding-bottom: 0 !important;
}
.reader-toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: var(--glass);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.reader-title-bar {
  flex: 1;
  text-align: center;
  font-size: .82rem;
  font-weight: 500;
  color: var(--text2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.reader-panels {
  flex: 1;
  display: flex;
  overflow: hidden;
}
.reader-panel {
  flex: 1;
  display: flex; flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--border);
}
.reader-panel:last-child { border-right: none; }
.reader-panel-label {
  font-size: .62rem;
  text-align: center;
  padding: 5px;
  background: var(--surface);
  color: var(--muted);
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  flex-shrink: 0;
}
.reader-canvas-wrap {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px;
  display: flex; flex-direction: column; align-items: center;
}
.reader-canvas-wrap canvas { max-width: 100%; border-radius: 4px; }
.reader-page-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px;
  border-top: 1px solid var(--border);
  background: var(--glass);
  flex-shrink: 0;
}
.reader-page-info { font-size: .75rem; color: var(--muted); }
.reader-nav-btns { display: flex; gap: 6px; }
.reader-btn {
  padding: 6px 14px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  font-size: .78rem;
  color: var(--text2);
  transition: all .18s;
}
.reader-btn:hover { background: var(--card); color: var(--text); }

/* ── DRAW ── */
.draw-wrap {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  overflow: hidden;
  padding-bottom: 0 !important;
}
.draw-toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  background: var(--glass);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}
.draw-canvas-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: crosshair;
  touch-action: none;
}
#draw-canvas { display: block; }
.draw-who-label {
  position: absolute; bottom: 8px; left: 8px;
  background: var(--glass);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: .7rem;
  color: var(--text2);
  pointer-events: none;
  opacity: 0;
  transition: opacity .3s;
}
.draw-who-label.show { opacity: 1; }
.color-swatch {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all .18s;
  flex-shrink: 0;
}
.color-swatch.active, .color-swatch:hover { transform: scale(1.2); border-color: var(--text); }
.brush-size-input { flex: 1; min-width: 60px; max-width: 100px; accent-color: var(--amber); }

/* ── MUSIC ── */
.yt-embed-wrap {
  margin: 0 16px 12px;
  border-radius: var(--radius);
  overflow: hidden;
  aspect-ratio: 16/9;
  background: var(--surface);
}
.yt-embed-wrap iframe { width: 100%; height: 100%; border: 0; }
.music-track {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .18s;
}
.music-track:hover { background: var(--surface2); }
.music-track.playing { background: var(--amber-soft); }
.track-art {
  width: 46px; height: 46px;
  border-radius: 10px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  overflow: hidden;
  flex-shrink: 0;
}
.track-art img { width: 100%; height: 100%; object-fit: cover; }
.track-info { flex: 1; min-width: 0; }
.track-name { font-size: .88rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.track-artist { font-size: .72rem; color: var(--muted); }
.track-playing-icon { color: var(--amber); animation: pulse 1.2s ease-in-out infinite; }
.music-track-dur { font-size: .7rem; color: var(--muted); flex-shrink: 0; }

/* ── STATS ── */
.stat-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  padding: 8px 16px 0;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}
.stat-value {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.4rem;
  font-weight: 300;
  color: var(--amber);
  line-height: 1;
}
.stat-label { font-size: .72rem; color: var(--muted); margin-top: 4px; }
.stat-icon { font-size: 1.4rem; margin-bottom: 8px; }

/* ── CHALLENGES ── */
.challenge-card {
  margin: 0 16px 10px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: all .2s;
}
.challenge-card:hover { border-color: var(--border2); }
.challenge-card.completed { opacity: .7; }
.ch-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px 10px;
}
.ch-icon { font-size: 1.8rem; flex-shrink: 0; }
.ch-title { font-size: .9rem; font-weight: 600; }
.ch-desc { font-size: .75rem; color: var(--muted); margin-top: 2px; }
.ch-progress {
  padding: 0 16px 14px;
}
.ch-bar {
  height: 6px;
  background: var(--surface2);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 6px;
}
.ch-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--amber), var(--rose));
  border-radius: 6px;
  transition: width .4s ease;
}
.ch-meta {
  display: flex; justify-content: space-between;
  font-size: .68rem; color: var(--muted);
}
.ch-points {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--amber-soft);
  color: var(--amber);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: .68rem;
  font-weight: 600;
}
.fire-streak {
  display: flex; align-items: center; gap: 6px;
  background: linear-gradient(135deg, rgba(255,107,53,.15), rgba(255,154,60,.15));
  border: 1px solid rgba(255,107,53,.3);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin: 0 16px 12px;
}
.fire-streak .fire { font-size: 1.8rem; animation: fire 1s ease-in-out infinite; }
.fire-streak-num {
  font-family: 'Cormorant Garamond', serif;
  font-size: 1.8rem;
  font-weight: 300;
  color: #ff6b35;
}
.fire-streak-label { font-size: .72rem; color: var(--text2); }

/* ── CONFIG ── */
.cfg-group {
  margin: 0 16px 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.cfg-row {
  display: flex; align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.cfg-row:last-child { border-bottom: none; }
.cfg-icon { font-size: 1.3rem; flex-shrink: 0; }
.cfg-info { flex: 1; }
.cfg-key { font-size: .85rem; font-weight: 500; }
.cfg-val { font-size: .72rem; color: var(--muted); }
.cfg-action { flex-shrink: 0; }
.toggle-switch {
  width: 44px; height: 26px;
  background: var(--surface2);
  border-radius: 13px;
  position: relative;
  cursor: pointer;
  transition: background .25s;
  border: 1px solid var(--border);
}
.toggle-switch.on { background: var(--amber); border-color: var(--amber); }
.toggle-knob {
  position: absolute;
  left: 3px; top: 3px;
  width: 18px; height: 18px;
  background: white;
  border-radius: 50%;
  transition: transform .25s;
  box-shadow: 0 1px 4px rgba(0,0,0,.3);
}
.toggle-switch.on .toggle-knob { transform: translateX(18px); }

/* ── TRANSLATE ── */
.translate-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin: 0 16px 12px;
  overflow: hidden;
}
.translate-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  font-size: .78rem;
  color: var(--muted);
}
.translate-lang-tag {
  background: var(--surface2);
  padding: 3px 10px;
  border-radius: 8px;
  font-size: .72rem;
  font-weight: 600;
}
.translate-swap-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: .9rem;
  transition: all .25s;
}
.translate-swap-btn:hover { background: var(--amber-soft); border-color: var(--amber); transform: rotate(180deg); }
.translate-area {
  padding: 12px 14px;
  min-height: 90px;
  font-size: .9rem;
  width: 100%;
  resize: none;
  color: var(--text);
  background: transparent;
  border: none;
  line-height: 1.6;
}
.translate-result {
  padding: 12px 14px;
  background: var(--surface);
  min-height: 60px;
  font-size: .9rem;
  color: var(--text2);
  line-height: 1.6;
  font-style: italic;
}
.phrase-chip {
  display: inline-block;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: .75rem;
  cursor: pointer;
  margin: 0 4px 6px 0;
  transition: all .18s;
}
.phrase-chip:hover { border-color: var(--amber); background: var(--amber-soft); color: var(--amber); }

/* ── Toggle switch ── */
.toggle-wrap{position:relative;display:inline-flex;align-items:center}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute}
.toggle-label{display:block;width:44px;height:24px;background:var(--dim);border-radius:12px;cursor:pointer;transition:background .25s;position:relative}
.toggle-label::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle-wrap input:checked+.toggle-label{background:var(--amber)}
.toggle-wrap input:checked+.toggle-label::after{transform:translateX(20px)}

/* ── DIARY sheets ── */
.diary-two-col{display:grid;grid-template-columns:1fr 1fr;gap:0;padding:0 12px 20px}
.diary-col{display:flex;flex-direction:column;gap:10px}
.diary-col-mine{padding-right:6px}
.diary-col-theirs{padding-left:6px}
.diary-col-header{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:8px 4px 4px;border-bottom:2px solid currentColor;margin-bottom:4px;opacity:.7}
.diary-empty-col{text-align:center;padding:24px 8px;color:var(--muted);font-size:.78rem;font-family:'Caveat',cursive;font-size:1rem;line-height:1.6}
.diary-sheet{background:var(--card);border:1px solid var(--border);border-radius:3px 12px 12px 3px;padding:14px 12px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.diary-sheet.mine{border-left:3px solid var(--amber)}
.diary-sheet.theirs{border-left:3px solid var(--rose)}
.diary-sheet:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.diary-sheet-corner{position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 18px 18px 0;border-color:transparent var(--surface2) transparent transparent}
.diary-sheet-mood{font-size:1.3rem;margin-bottom:6px}
.diary-sheet-date{font-size:.62rem;color:var(--muted);margin-bottom:4px}
.diary-sheet-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:500;margin-bottom:6px;line-height:1.2}
.diary-sheet-preview{font-size:.78rem;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;font-family:'Caveat',cursive;font-size:.9rem}
.diary-sheet-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
.diary-sheet-tags span{font-size:.58rem;color:var(--lav);background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);border-radius:20px;padding:1px 5px}
.diary-sheet-lines{position:absolute;bottom:0;left:0;right:0;height:3px;background:repeating-linear-gradient(90deg,var(--border) 0,var(--border) 60%,transparent 60%,transparent 100%);background-size:8px 1px}
.mood-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:4px}
.mood-opt{background:var(--surface);border:2px solid var(--border);border-radius:var(--r-sm);padding:8px 4px;text-align:center;cursor:pointer;transition:all .18s}
.mood-opt:hover,.mood-opt.active{border-color:var(--amber);background:var(--amber-s)}
.diary-write-area{font-family:'Caveat',cursive!important;font-size:1.15rem!important;line-height:2!important;background-image:repeating-linear-gradient(transparent,transparent 31px,var(--border) 31px,var(--border) 32px)!important}

/* ── DRAW full-screen ── */
.draw-toolbar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--glass2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;backdrop-filter:blur(20px)}
.draw-tools{display:flex;gap:4px}
.draw-tool-btn{width:34px;height:34px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .18s;flex-shrink:0}
.draw-tool-btn.active{background:var(--amber);color:#000}
.draw-tool-btn:hover:not(.active){background:var(--card2);color:var(--text)}
.draw-colors{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.draw-color-btn{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);cursor:pointer;transition:all .18s;flex-shrink:0}
.draw-color-btn.active{border-color:#fff;transform:scale(1.25);box-shadow:0 0 0 2px var(--amber)}
.draw-size-wrap{display:flex;align-items:center;gap:8px;flex:1;min-width:80px}
.draw-size-slider{flex:1;accent-color:var(--amber)}
.draw-size-preview{border-radius:50%;flex-shrink:0;transition:all .18s;background:var(--amber);min-width:4px;min-height:4px;max-width:32px;max-height:32px}
.draw-actions{display:flex;gap:4px;margin-left:auto}
.draw-action-btn{width:34px;height:34px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .18s;flex-shrink:0}
.draw-action-btn:hover{background:var(--card2);color:var(--text)}
.draw-canvas-container{flex:1;overflow:hidden;position:relative;background:var(--bg);cursor:crosshair}
#draw-canvas{display:block;position:absolute;inset:0;width:100%;height:100%}
.draw-who-label{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:var(--glass2);border:1px solid var(--border2);border-radius:20px;padding:5px 14px;font-size:.75rem;font-weight:500;pointer-events:none;opacity:0;transition:opacity .3s;backdrop-filter:blur(10px);white-space:nowrap}
.draw-who-label.show{opacity:1}
.draw-status-bar{padding:4px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--glass);border-top:1px solid var(--border);flex-shrink:0;font-size:.65rem}

/* ── READER improved ── */
.reader-toolbar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--glass2);border-bottom:1px solid var(--border);flex-shrink:0;backdrop-filter:blur(20px)}
.reader-title-bar{flex:1;text-align:center;font-size:1rem;font-weight:400;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.reader-btn{height:32px;min-width:32px;padding:0 8px;background:var(--surface2);border-radius:8px;font-size:.8rem;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .18s;cursor:pointer}
.reader-btn-sm{min-width:28px;height:28px}
.reader-btn:hover{background:var(--card2);color:var(--text)}
.reader-panels{display:flex;flex:1;overflow:hidden}
.reader-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.reader-divider{width:1px;background:var(--border);flex-shrink:0}
.reader-panel-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.reader-panel-label{font-size:.72rem;font-weight:600;color:var(--text2)}
.reader-page-info{font-size:.7rem;color:var(--muted)}
.reader-canvas-wrap{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--bg2);padding:4px;position:relative}
.reader-canvas-wrap.drag-over{outline:2px dashed var(--amber);background:var(--amber-s)}
.reader-pdf-canvas{display:block;width:100%;border-radius:3px}
.reader-txt-page{padding:16px;font-family:'Cormorant Garamond',serif;font-size:1.05rem;line-height:1.9;color:var(--text2);white-space:pre-wrap}
.reader-nav-bar{display:flex;align-items:center;gap:4px;padding:6px 8px;background:var(--glass2);border-top:1px solid var(--border);flex-shrink:0;backdrop-filter:blur(10px)}
.reader-nav-btn{width:30px;height:30px;background:var(--surface2);border-radius:7px;font-size:.9rem;color:var(--text2);display:flex;align-items:center;justify-content:center;transition:all .18s;cursor:pointer;flex-shrink:0}
.reader-nav-btn:hover{background:var(--card2);color:var(--text)}
.reader-page-input-wrap{flex:1;text-align:center}
.reader-page-input{width:52px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px;text-align:center;font-size:.8rem;color:var(--text);-moz-appearance:textfield}
.reader-page-input::-webkit-inner-spin-button,.reader-page-input::-webkit-outer-spin-button{-webkit-appearance:none}
.reader-drop-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:200px;gap:8px;cursor:pointer;padding:20px;transition:all .2s}
.reader-drop-zone:hover{background:var(--surface2)}
.rdz-icon{font-size:3rem;opacity:.4}
.rdz-text{font-size:.9rem;color:var(--text2);font-weight:500}
.rdz-sub{font-size:.72rem;color:var(--muted)}
.rdz-loading{display:flex;flex-direction:column;align-items:center;gap:10px;padding:30px;color:var(--muted);font-size:.82rem}
.rdz-spinner{width:24px;height:24px;border:2px solid var(--dim);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite}
.reader-sync-bar{padding:7px 14px;background:linear-gradient(90deg,var(--rose-s),transparent);border-top:1px solid var(--rose-s);font-size:.75rem;color:var(--text2);text-align:center;animation:slideIn .3s ease}

/* ── TRANSLATE improved ── */
.tl-lang-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.tl-lang-pick{flex:1;display:flex;align-items:center;gap:6px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:9px 12px;cursor:pointer;transition:all .18s;font-size:.85rem}
.tl-lang-pick:hover{border-color:var(--amber)}
.tl-swap-btn{width:36px;height:36px;background:var(--surface2);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--text2);flex-shrink:0;transition:all .2s}
.tl-swap-btn:hover{background:var(--amber);color:#000;transform:rotate(180deg)}
.tl-textarea{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:12px;font-size:.95rem;color:var(--text);resize:none;min-height:80px;line-height:1.6;transition:border-color .2s}
.tl-textarea:focus{border-color:var(--amber);outline:none}
.tl-result-card{border-color:rgba(126,200,227,.2);background:linear-gradient(135deg,rgba(126,200,227,.05),transparent)}
.tl-preset{cursor:pointer;margin-bottom:8px;transition:all .18s}
.tl-preset:hover{border-color:var(--amber);transform:translateX(2px)}
.lang-opt{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);cursor:pointer;transition:all .18s}
.lang-opt:hover,.lang-opt.active{border-color:var(--amber);background:var(--amber-s)}

/* ── Mini music player in topbar ── */
#mp-topbar{display:none;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 8px 3px 6px;max-width:160px;overflow:hidden}
.mp-mini-title{font-size:.65rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;max-width:80px}
#mp-mini-btn{width:22px;height:22px;background:var(--amber);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#000;flex-shrink:0;font-size:.7rem}
.mp-mini-bar-wrap{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--border)}
#mp-mini-progress{height:100%;background:var(--amber);width:0%;transition:width .5s linear}
.mp-mini-note{font-size:.8rem;flex-shrink:0}

@keyframes spin{to{transform:rotate(360deg)}}

/* Mobile diary: stack columns */
@media(max-width:480px){
  .diary-two-col{grid-template-columns:1fr;padding:0 8px 20px}
  .diary-col-mine{padding-right:0;border-bottom:1px solid var(--border);padding-bottom:12px;margin-bottom:4px}
  .diary-col-theirs{padding-left:0}
}

/* ── READER expand button ── */
.reader-expand-btn{width:24px;height:24px;background:var(--surface2);border-radius:6px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:pointer;transition:all .18s;border:none;flex-shrink:0}
.reader-expand-btn:hover{background:var(--card2);color:var(--amber)}
.reader-panel-header{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:6px}
.reader-txt{padding:16px;font-family:'Cormorant Garamond',serif;font-size:1.05rem;line-height:1.9;color:var(--text2);white-space:pre-wrap;width:100%}
.rdz-loading{display:flex;flex-direction:column;align-items:center;gap:10px;padding:30px;color:var(--muted);font-size:.82rem;width:100%}
.rdz-spinner{width:24px;height:24px;border:2px solid var(--dim);border-top-color:var(--amber);border-radius:50%;animation:spin .8s linear infinite}

/* ═══════════════════════════════════════════════
   ANIMATIONS
   ═══════════════════════════════════════════════ */

@keyframes slideIn {
  from { transform: translateX(30px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to   { transform: translateY(0);    opacity: 1; }
}
@keyframes fadeIn {
  from { opacity: 0; } to { opacity: 1; }
}
@keyframes dot-pulse {
  0%, 80%, 100% { transform: scale(0.6); opacity: .4; }
  40%           { transform: scale(1);   opacity: 1; }
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: .5; }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-8px); }
}
@keyframes spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes shimmer {
  from { background-position: -200% 0; }
  to   { background-position: 200% 0; }
}
@keyframes streak-bounce {
  0%, 100% { transform: scale(1); }
  50%       { transform: scale(1.15); }
}
@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  25%       { transform: scale(1.1); }
  75%       { transform: scale(.95); }
}
@keyframes particles-float {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
}
@keyframes fire {
  0%, 100% { transform: scale(1) rotate(-3deg); }
  50%       { transform: scale(1.15) rotate(3deg); }
}
@keyframes glow-pulse {
  0%, 100% { box-shadow: 0 0 10px rgba(232,168,74,.3); }
  50%       { box-shadow: 0 0 30px rgba(232,168,74,.6); }
}

/* Skeleton loader */
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 6px;
}

/* Stagger children */
.stagger > * { animation: slideUp .4s cubic-bezier(.23,1,.32,1) both; }
.stagger > *:nth-child(1) { animation-delay: .05s; }
.stagger > *:nth-child(2) { animation-delay: .1s; }
.stagger > *:nth-child(3) { animation-delay: .15s; }
.stagger > *:nth-child(4) { animation-delay: .2s; }
.stagger > *:nth-child(5) { animation-delay: .25s; }
.stagger > *:nth-child(6) { animation-delay: .3s; }
@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes dot-pulse{0%,80%,100%{transform:scale(0);opacity:.4}40%{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

</style>
</head>

<script>
(function(){
// ── DB: Supabase wrapper ───────────────────────────────────────────────────────
const DB = (() => {
  let _sb = null;

  function client() {
    if (!_sb) {
      const cfg = window.DL_CONFIG;
      _sb = supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_KEY, {
        auth: { persistSession: true, autoRefreshToken: true }
      });
    }
    return _sb;
  }

  // ── Warm up: ping Supabase to wake from free-tier sleep ──
  async function warmUp() {
    try {
      await client().from('profiles').select('id').limit(1);
    } catch {}
  }

  // ── Auth ──
  const Auth = {
    async signUp(email, password, displayName, lang) {
      const { data, error } = await client().auth.signUp({
        email, password,
        options: { data: { full_name: displayName, lang: lang || 'en' } }
      });
      if (error) throw error;
      return data;
    },
    async signIn(email, password) {
      const { data, error } = await client().auth.signInWithPassword({ email, password });
      if (error) throw error;
      return data;
    },
    async signInGoogle() {
      const { error } = await client().auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.href }
      });
      if (error) throw error;
    },
    async signOut() { await client().auth.signOut(); },
    async getUser() {
      const { data: { user } } = await client().auth.getUser();
      return user;
    },
    async getSession() {
      const { data: { session } } = await client().auth.getSession();
      return session;
    },
    onAuthChange(cb) { return client().auth.onAuthStateChange(cb); }
  };

  // ── Data helpers ──
  async function get(table, query) {
    query = query || {};
    let q = client().from(table).select(query.select || '*');
    if (query.eq)    for (var i = 0; i < query.eq.length; i++) q = q.eq(query.eq[i][0], query.eq[i][1]);
    if (query.eqOne) q = q.eq(query.eqOne[0], query.eqOne[1]);
    if (query.order) q = q.order(query.order[0], query.order[1] || {});
    if (query.limit) q = q.limit(query.limit);
    const { data, error } = await q;
    if (error) throw error;
    return data || [];
  }

  async function insert(table, row) {
    const { data, error } = await client().from(table).insert(row).select().single();
    if (error) throw error;
    return data;
  }

  async function upsert(table, row, opts) {
    const { data, error } = await client().from(table).upsert(row, opts || {}).select().single();
    if (error) throw error;
    return data;
  }

  async function update(table, match, changes) {
    let q = client().from(table).update(changes);
    var keys = Object.keys(match);
    for (var i = 0; i < keys.length; i++) q = q.eq(keys[i], match[keys[i]]);
    const { error } = await q;
    if (error) throw error;
  }

  async function remove(table, match) {
    let q = client().from(table).delete();
    var keys = Object.keys(match);
    for (var i = 0; i < keys.length; i++) q = q.eq(keys[i], match[keys[i]]);
    const { error } = await q;
    if (error) throw error;
  }

  async function uploadFile(bucket, path, file) {
    const { error } = await client().storage.from(bucket).upload(path, file, {
      cacheControl: '3600', upsert: true
    });
    if (error) throw error;
    const { data } = client().storage.from(bucket).getPublicUrl(path);
    return data.publicUrl;
  }

  async function getSetting(coupleId, key) {
    try {
      const rows = await get('settings', { eq: [['couple_id', coupleId], ['key', key]] });
      return rows && rows[0] ? rows[0].value : null;
    } catch { return null; }
  }

  async function setSetting(coupleId, key, value) {
    return upsert('settings', {
      couple_id: coupleId, key: key, value: value,
      updated_at: new Date().toISOString()
    }, { onConflict: 'couple_id,key' });
  }

  async function ping() {
    try {
      await client().from('profiles').select('id').limit(1);
      return true;
    } catch { return false; }
  }

  // ── Keepalive: ping every 4 min to prevent free-tier sleep ──
  function startKeepalive() {
    // Immediate warmup
    warmUp();
    // Then every 4 minutes
    setInterval(function() {
      ping().catch(function(){});
    }, 4 * 60 * 1000);
  }

  return { client, Auth, warmUp, get, insert, upsert, update, remove, uploadFile, getSetting, setSetting, ping, startKeepalive };
})();


// ── Utils ────────────────────────────────────────────────────────────────────
const Utils = {
  // Date/time
  formatTime(date) {
    return new Date(date).toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
  },
  formatDate(date) {
    return new Date(date).toLocaleDateString('es', { day: 'numeric', month: 'short', year: 'numeric' });
  },
  formatRelative(date) {
    const now = new Date();
    const d = new Date(date);
    const diff = now - d;
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'ahora mismo';
    if (mins < 60) return `hace ${mins} min`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `hace ${hrs}h`;
    const days = Math.floor(hrs / 24);
    if (days === 1) return 'ayer';
    if (days < 7) return `hace ${days} días`;
    return Utils.formatDate(date);
  },
  daysSince(dateStr) {
    if (!dateStr) return 0;
    const start = new Date(dateStr);
    const now = new Date();
    return Math.floor((now - start) / (1000 * 60 * 60 * 24));
  },
  daysUntil(dateStr) {
    if (!dateStr) return 0;
    const target = new Date(dateStr);
    const now = new Date();
    return Math.max(0, Math.ceil((target - now) / (1000 * 60 * 60 * 24)));
  },
  getCurrentTime(tz) {
    return new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit', second: '2-digit', timeZone: tz, hour12: false });
  },

  // String
  truncate(str, n = 100) {
    if (!str) return '';
    return str.length > n ? str.slice(0, n) + '…' : str;
  },
  escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  },

  // ID
  uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  },

  // File
  readFileAsArrayBuffer(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = rej;
      r.readAsArrayBuffer(file);
    });
  },
  readFileAsText(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = rej;
      r.readAsText(file, 'utf-8');
    });
  },
  readFileAsDataURL(file) {
    return new Promise((res, rej) => {
      const r = new FileReader();
      r.onload = e => res(e.target.result);
      r.onerror = rej;
      r.readAsDataURL(file);
    });
  },

  // Format bytes
  fmtBytes(b) {
    if (b < 1024) return b + ' B';
    if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1024 / 1024).toFixed(1) + ' MB';
  },

  // Debounce
  debounce(fn, ms = 300) {
    let t;
    return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
  },

  // Clamp
  clamp(n, min, max) { return Math.min(Math.max(n, min), max); },

  // el
  el(id) { return document.getElementById(id); },
  qs(sel, parent = document) { return parent.querySelector(sel); },
  qsa(sel, parent = document) { return [...parent.querySelectorAll(sel)]; },
};


// ── State ─────────────────────────────────────────────────────────────────────
const State = (() => {
  const _s = {
    user: null, profile: null, couple: null,
    members: [], partner: null,
    theme: 'dark', streak: 0, currentBook: null,
    // Page cache — stores fetched data per page so we don't reload every visit
    _cache: {}
  };
  const _listeners = {};

  function get(k)   { return _s[k]; }
  function set(k, v) {
    _s[k] = v;
    (_listeners[k] || []).forEach(fn => fn(v));
    if (k === 'theme') localStorage.setItem('dl_theme', v);
  }
  function on(k, fn) { (_listeners[k] = _listeners[k] || []).push(fn); }

  function cache(key, data) {
    if (data !== undefined) { _s._cache[key] = { data, ts: Date.now() }; return data; }
    const c = _s._cache[key];
    if (!c) return null;
    // Cache valid for 30 seconds
    if (Date.now() - c.ts > 30000) { delete _s._cache[key]; return null; }
    return c.data;
  }

  function invalidate(key) { delete _s._cache[key]; }

  function hydrate() {
    const t = localStorage.getItem('dl_theme');
    if (t) _s.theme = t;
    _s.streak = parseInt(localStorage.getItem('dl_streak') || '0');
    // Load cached data for instant display — will be overwritten by fresh data from Supabase
    try {
      const cp = localStorage.getItem('dl_couple');
      const pt = localStorage.getItem('dl_partner');
      const pr = localStorage.getItem('dl_profile');
      // Only use cache if it's less than 24 hours old
      if (cp) {
        const parsed = JSON.parse(cp);
        const age = Date.now() - (parsed._ts || 0);
        if (age < 24 * 60 * 60 * 1000) _s.couple = parsed;
      }
      if (pt) _s.partner = JSON.parse(pt);
      if (pr) _s.profile = JSON.parse(pr);
    } catch {}
  }

  function clear() {
    _s.user = null; _s.profile = null; _s.couple = null;
    _s.members = []; _s.partner = null; _s.currentBook = null;
    _s._cache = {};
  }

  return { get, set, on, hydrate, cache, invalidate, clear };
})();


// ── LocalCache — instant data from localStorage ───────────────────────────────
const LocalCache = (() => {
  const PREFIX = 'dl_cache_';
  const TTL    = 5 * 60 * 1000; // 5 minutes

  function key(name) { return PREFIX + name; }

  function set(name, data) {
    try {
      localStorage.setItem(key(name), JSON.stringify({ data, ts: Date.now() }));
    } catch {}
  }

  function get(name, maxAge) {
    try {
      const raw = localStorage.getItem(key(name));
      if (!raw) return null;
      const { data, ts } = JSON.parse(raw);
      if (Date.now() - ts > (maxAge || TTL)) return null;
      return data;
    } catch { return null; }
  }

  function getStale(name) {
    // Return data even if expired — better than nothing while loading
    try {
      const raw = localStorage.getItem(key(name));
      if (!raw) return null;
      return JSON.parse(raw).data;
    } catch { return null; }
  }

  function clear(name) {
    try { localStorage.removeItem(key(name)); } catch {}
  }

  return { set, get, getStale, clear };
})();


// ── AppAuth — minimal, no race conditions ─────────────────────────────────────
const AppAuth = (() => {

  function currentCoupleId() {
    return State.get('couple')?.id || null;
  }

  // Called once on startup — check for existing session
  async function init() {
    try {
      const { data } = await DB.client().auth.getSession();
      if (data?.session?.user) {
        await _load(data.session.user);
        return;
      }
    } catch(e) {
      console.warn('init error:', e.message);
      _nukeStorage();
    }
    App.showAuth();
  }

  // Called by login button — handles everything end to end
  async function login(email, password) {
    const { data, error } = await DB.client().auth.signInWithPassword({ email, password });
    if (error) throw error;
    await _load(data.user);
  }

  // Called by register button
  async function register(email, password, name, lang) {
    // Sign up
    const { error: signUpError } = await DB.client().auth.signUp({
      email, password,
      options: { data: { full_name: name, lang: lang || 'en' } }
    });
    if (signUpError) throw signUpError;
    // Sign in immediately (works because email confirm is OFF)
    const { data, error: signInError } = await DB.client().auth.signInWithPassword({ email, password });
    if (signInError) throw signInError;
    await _load(data.user);
  }

  async function signOut() {
    try { await DB.client().auth.signOut(); } catch {}
    _nukeStorage();
    State.clear();
    App.showAuth();
  }

  async function createCouple(name, displayName, emoji, timezone, city) {
    const user = State.get('user');
    if (!user) throw new Error('Not logged in');
    const couple = await DB.insert('couples', { name: name || displayName + "'s space" });
    await DB.insert('couple_members', {
      couple_id: couple.id, user_id: user.id,
      display_name: displayName, emoji,
      timezone: timezone || 'America/Montevideo', city: city || ''
    });
    await DB.upsert('profiles', {
      id: user.id, display_name: displayName, emoji,
      lang: State.get('profile')?.lang || 'en',
      timezone: timezone || 'America/Montevideo', city: city || ''
    }, { onConflict: 'id' });
    await _load(user);
  }

  async function joinCouple(code, displayName, emoji, timezone, city) {
    const user = State.get('user');
    if (!user) throw new Error('Not logged in');
    const { data, error } = await DB.client().from('couples').select('*').eq('invite_code', code.trim().toLowerCase()).single();
    if (error || !data) throw new Error('Invalid invite code');
    const members = await DB.get('couple_members', { eqOne: ['couple_id', data.id] });
    if (members.length >= 2) throw new Error('This couple is full');
    await DB.insert('couple_members', {
      couple_id: data.id, user_id: user.id,
      display_name: displayName, emoji,
      timezone: timezone || 'America/Montevideo', city: city || ''
    });
    await DB.upsert('profiles', {
      id: user.id, display_name: displayName, emoji,
      lang: State.get('profile')?.lang || 'en',
      timezone: timezone || 'America/Montevideo', city: city || ''
    }, { onConflict: 'id' });
    await _load(user);
  }

  // ── Internal ───────────────────────────────────────────────────────────────
  async function _load(user) {
    State.set('user', user);

    // Profile
    try {
      const rows = await DB.get('profiles', { eqOne: ['id', user.id] });
      State.set('profile', rows[0] || { id: user.id, display_name: user.email.split('@')[0], emoji: '😊', lang: 'en' });
    } catch {
      State.set('profile', { id: user.id, display_name: user.email.split('@')[0], emoji: '😊', lang: 'en' });
    }

    // Couple
    try {
      const memberships = await DB.get('couple_members', { eqOne: ['user_id', user.id] });
      if (!memberships.length) { App.showCoupleSetup(); return; }

      const coupleId = memberships[0].couple_id;
      const [couples, allMembers] = await Promise.all([
        DB.get('couples', { eqOne: ['id', coupleId] }),
        DB.get('couple_members', { eqOne: ['couple_id', coupleId] }),
      ]);

      State.set('couple',  couples[0] || null);
      State.set('members', allMembers);
      State.set('partner', allMembers.find(m => m.user_id !== user.id) || null);

      try {
        localStorage.setItem('dl_couple',  JSON.stringify({ ...(couples[0]||{}), _ts: Date.now() }));
        localStorage.setItem('dl_partner', JSON.stringify(State.get('partner')));
        localStorage.setItem('dl_profile', JSON.stringify(State.get('profile')));
      } catch {}

      App.showApp();
    } catch(e) {
      console.error('_load couple error:', e);
      App.showCoupleSetup();
    }
  }

  function _nukeStorage() {
    try {
      const del = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && (k.startsWith('dl_') || k.startsWith('sb-') || k.includes('supabase'))) del.push(k);
      }
      del.forEach(k => localStorage.removeItem(k));
    } catch {}
  }

  return { init, login, register, signOut, createCouple, joinCouple, currentCoupleId };
})();

    diary:      { get init() { return PageDiary.init; },      title: 'Diario 📔' },
    library:    { get init() { return PageLibrary.init; },    title: 'Biblioteca 📚' },
    reader:     { get init() { return PageReader.init; },     title: 'Lector 📖' },
    music:      { get init() { return PageMusic.init; },      title: 'Música 🎵' },
    draw:       { get init() { return PageDraw.init; },       title: 'Pizarra 🎨' },
    translate:  { get init() { return PageTranslate.init; },  title: 'Traductor 🤖' },
    stats:      { get init() { return PageStats.init; },      title: 'Estadísticas 📊' },
    challenges: { get init() { return PageChallenges.init; }, title: 'Retos 🔥' },
    config:     { get init() { return PageConfig.init; },     title: 'Ajustes ⚙️' },
  };

  let _current = null;
  let _container = null;

  function init(container) { _container = container; }

  function go(pageId, params = {}) {
    if (!PAGES[pageId]) { console.warn('Unknown page:', pageId); return; }
    _current = pageId;

    const tt = Utils.el('tb-title');
    if (tt) tt.textContent = pageId === 'home' ? 'DuoLector' : PAGES[pageId].title;

    Utils.qsa('.bnav-btn').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.page === pageId)
    );

    Sidebar.updateActive(pageId);

    _container.innerHTML = '';
    const page = document.createElement('div');
    page.className = 'page active';
    page.id = 'page-' + pageId;
    _container.appendChild(page);

    try {
      PAGES[pageId].init(page, params);
    } catch (e) {
      console.error('Page init error:', e);
      page.innerHTML = `<div style="padding:20px;color:var(--muted)">Error: ${e.message}</div>`;
    }
  }

  function current() { return _current; }

  return { init, go, current };
})();


// ── Notifications ────────────────────────────────────────────────────────────
const Notifications = (() => {
  let _items = [];
  let _open = false;

  function add(item) {
    _items.unshift({ id: Utils.uid(), ts: new Date().toISOString(), read: false, ...item });
    if (_items.length > 50) _items = _items.slice(0, 50);
    _save();
    _updateDot();
  }

  function toggle() {
    _open ? close() : open();
  }

  function open() {
    _open = true;
    const panel = Utils.el('notif-panel');
    panel.style.display = 'flex';
    panel.style.flexDirection = 'column';
    _render();
    setTimeout(() => panel.style.opacity = '1', 10);
  }

  function close() {
    _open = false;
    const panel = Utils.el('notif-panel');
    panel.style.display = 'none';
  }

  function markAll() {
    _items.forEach(i => i.read = true);
    _save();
    _updateDot();
    _render();
  }

  function _render() {
    const list = Utils.el('notif-list');
    if (!list) return;
    if (!_items.length) {
      list.innerHTML = '<div class="notif-empty">Ninguna notificación 🌙</div>';
      return;
    }
    list.innerHTML = _items.map(n => `
      <div class="notif-item ${n.read ? '' : 'unread'}" onclick="Notifications._markRead('${n.id}')">
        <div class="notif-ico">${n.icon || '🔔'}</div>
        <div class="notif-body">
          <div class="notif-text">${Utils.escHtml(n.text)}</div>
          <div class="notif-time">${Utils.formatRelative(n.ts)}</div>
        </div>
      </div>
    `).join('');
  }

  function _markRead(id) {
    const n = _items.find(i => i.id === id);
    if (n) { n.read = true; _save(); _updateDot(); _render(); }
  }

  function _updateDot() {
    const dot = Utils.el('notif-dot');
    const unread = _items.filter(i => !i.read).length;
    if (dot) dot.style.display = unread ? 'block' : 'none';
  }

  function _save() {
    localStorage.setItem('dl_notifs', JSON.stringify(_items.slice(0, 30)));
  }

  function load() {
    try { _items = JSON.parse(localStorage.getItem('dl_notifs') || '[]'); } catch { _items = []; }
    _updateDot();
  }

  // Click outside to close
  document.addEventListener('click', e => {
    if (_open && !e.target.closest('#notif-panel') && !e.target.closest('.notif-wrap')) {
      close();
    }
  });

  return { add, toggle, open, close, markAll, load, _markRead };
})();


// ── MusicPlayer — topbar mini player ─────────────────────────────────────────
const MusicPlayer = (() => {
  let _track = null;
  let _playing = false;
  let _pct = 0;
  let _timer = null;

  function init() {
    _updateUI();
  }

  function _setTrack(track) {
    _track = track;
    _playing = true;
    _pct = 0;
    _updateUI();
    _show();
    _startProgress();
  }

  function _setPlaying(val) {
    _playing = val;
    _updateUI();
  }

  function toggle() {
    _playing = !_playing;
    if (_playing) _startProgress(); else clearInterval(_timer);
    _updateUI();
  }

  function close() {
    const mp = document.getElementById('mp-topbar');
    if (mp) mp.style.display = 'none';
    _playing = false;
    clearInterval(_timer);
  }

  function _show() {
    const mp = document.getElementById('mp-topbar');
    if (mp && _track) mp.style.display = 'flex';
  }

  function _startProgress() {
    clearInterval(_timer);
    if (!_playing) return;
    _timer = setInterval(() => {
      _pct = Math.min(_pct + 0.5, 100);
      const bar = document.getElementById('mp-mini-bar');
      if (bar) bar.style.width = _pct + '%';
      if (_pct >= 100) { clearInterval(_timer); _pct = 0; }
    }, 300);
  }

  function _updateUI() {
    if (!_track) return;
    const titleEl = document.getElementById('mp-mini-title');
    const btnEl   = document.getElementById('mp-mini-btn');
    if (titleEl) titleEl.textContent = _track.title;
    if (btnEl)   btnEl.textContent   = _playing ? '⏸' : '▶';
  }

  return { init, toggle, close, _setTrack, _setPlaying };
})();


// ── Toast ────────────────────────────────────────────────────────────────────
const Toast = (() => {
  let _timer;
  function show(msg, duration = 2500) {
    const el = Utils.el('toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_timer);
    _timer = setTimeout(() => el.classList.remove('show'), duration);
  }
  return { show };
})();

// Global shorthand
function toast(msg, d) { Toast.show(msg, d); }


// ── Modal ────────────────────────────────────────────────────────────────────
const Modal = (() => {
  function show({ title, content, footer, center = false }) {
    const overlay = Utils.el('modal-overlay');
    const box = Utils.el('modal-box');
    box.className = 'modal-box' + (center ? ' center-modal' : '');
    box.innerHTML = `
      <div class="modal-handle"></div>
      ${title ? `<div class="modal-title">${title}</div>` : ''}
      <div class="modal-body">${content || ''}</div>
      ${footer ? `<div class="modal-footer">${footer}</div>` : ''}
    `;
    overlay.style.display = 'block';
    box.style.display = 'block';
    requestAnimationFrame(() => {
      overlay.style.opacity = '1';
      box.style.transform = center ? 'translate(-50%, -50%)' : 'translateX(-50%) translateY(0)';
      box.style.opacity = '1';
    });
  }

  function close() {
    const overlay = Utils.el('modal-overlay');
    const box = Utils.el('modal-box');
    overlay.style.opacity = '0';
    box.style.opacity = '0';
    setTimeout(() => {
      overlay.style.display = 'none';
      box.style.display = 'none';
    }, 200);
  }

  return { show, close };
})();

      ['translate','🤖',lang==='ru'?'Перевод':'Traducir'],

      html += '<div class="qg-label">' + item[2] + '</div>';
      html += '</div>';
    });
    html += '</div>';

    // Quote
    html += '<div class="section-label">' + (lang==='ru'?'Цитата дня':'Frase del día') + '</div>';
    html += '<div class="quote-card"><div class="quote-text hw">' + quoteText + '</div><div class="quote-author">— DuoLector</div></div>';

    var meetBtn = document.getElementById('cfg-meet-prompt');
    if (meetBtn) meetBtn.addEventListener('click', function() { Router.go('config'); });

    _startClocks();

  function _startClocks() {
    if (_clockInterval) clearInterval(_clockInterval);
    var tick = function() {
      var uy = Utils.el('clock-uy'), ru = Utils.el('clock-ru');
      if (!uy || !ru) { clearInterval(_clockInterval); return; }
      var user    = State.get('profile');
      var partner = State.get('partner');
      var myTz = user && user.timezone ? user.timezone : 'America/Montevideo';
      var ptTz = partner && partner.timezone ? partner.timezone : 'Europe/Samara';
      var myLang = user && user.lang === 'ru' ? 'ru' : 'es';
      var ptLang = partner ? (myLang === 'ru' ? 'es' : 'ru') : myLang;
      uy.textContent = new Date().toLocaleTimeString(myLang, { timeZone: myTz, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      ru.textContent = new Date().toLocaleTimeString(ptLang, { timeZone: ptTz, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    };
    tick();
    _clockInterval = setInterval(tick, 1000);
  }

  async function _checkPartner() {
    var coupleId = AppAuth.currentCoupleId();
    if (!coupleId) return;
    var dot = Utils.el('partner-dot');
    try {
      var myId = State.get('profile') ? State.get('profile').id : null;
      if (myId) {
        await DB.setSetting(coupleId, 'last_seen_' + myId, JSON.stringify({ ts: Date.now() }));
      }
      var partner = State.get('partner');
      if (!partner || !dot) return;
      var raw = await DB.getSetting(coupleId, 'last_seen_' + partner.user_id);
      if (!raw) return;
      var diff = Date.now() - JSON.parse(raw).ts;
      if (diff < 3 * 60 * 1000) dot.style.background = 'var(--mint)';
      else if (diff < 30 * 60 * 1000) dot.style.background = 'var(--amber)';
    } catch {}
  }

  function _editMyTz() {
    Router.go('config');
    setTimeout(() => {
      const el = document.getElementById('cfg-tz');
      if (el) el.scrollIntoView({behavior:'smooth', block:'center'});
    }, 300);
  }

  function _editPartnerTz() {
    const partner = State.get('partner');
    const lang = State.get('profile')?.lang || 'en';
    if (!partner) {
      if (window.toast) toast(lang==='ru'?'Паrtнёр не подключён':'No partner connected yet');
      return;
    }
    if (window.toast) toast(lang==='ru'?
      'Партнёр должен изменить свой часовой пояс в настройках':
      'Your partner can change their timezone in their Settings');
  }

  return { init, _editMyTz, _editPartnerTz };
})();

  // ── Beautiful stars background ─────────────────────────────────────────────
  function _initStarsCanvas() {
    const cv = document.getElementById('chat-stars');
    if (!cv) return;
    const ctx = cv.getContext('2d');
    let W, H, stars = [], snowflakes = [], shooters = [];

    function resize() {
      const p = cv.parentElement; if (!p) return;
      W = cv.width  = p.clientWidth  || window.innerWidth;
      H = cv.height = p.clientHeight || window.innerHeight;
      stars = Array.from({length:140}, () => ({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.4+0.2,
        o: Math.random()*0.55+0.1,
        sp: Math.random()*0.015+0.003,
        ph: Math.random()*Math.PI*2,
        c: Math.random()>0.85 ? '#b0c4ff' : '#ffffff'
      }));
      snowflakes = Array.from({length:60}, () => ({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*2+0.5,
        vx: (Math.random()-.5)*0.3, vy: Math.random()*0.6+0.2,
        o: Math.random()*0.5+0.2,
        wobble: Math.random()*Math.PI*2, wobbleSpeed: Math.random()*0.02+0.005
      }));
    }
    resize();
    new ResizeObserver(resize).observe(cv.parentElement);

    function spawnShooter() {
      if (document.body.getAttribute('data-theme')==='light') return;
      if (Math.random() > 0.003) return; // Very rare
      shooters.push({
        x: Math.random()*W*0.6, y: Math.random()*H*0.4,
        vx: 4+Math.random()*5, vy: 2+Math.random()*3,
        life: 1, maxLife: 0.7+Math.random()*0.5, tail: []
      });
    }

    function draw() {
      if (!document.getElementById('chat-stars')) { cancelAnimationFrame(_chatRaf); return; }
      const isLight = document.body.getAttribute('data-theme')==='light';
      ctx.clearRect(0, 0, W, H);

      if (isLight) {
        // Warm snow background
        ctx.fillStyle = 'rgba(253,248,242,0.0)';
        const t = Date.now()/1000;
        snowflakes.forEach(f => {
          f.wobble += f.wobbleSpeed;
          f.x += f.vx + Math.sin(f.wobble)*0.3;
          f.y += f.vy;
          if (f.y > H+10) { f.y = -10; f.x = Math.random()*W; }
          if (f.x > W+10) f.x = -10;
          if (f.x < -10)  f.x = W+10;
          ctx.beginPath();
          ctx.arc(f.x, f.y, f.r, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(180,210,255,' + (f.o*0.8) + ')';
          ctx.fill();
        });
      } else {
        // Dark mode: twinkling stars
        const t = Date.now()/1000;
        stars.forEach(s => {
          const o = s.o * (0.6 + 0.4 * Math.sin(t * s.sp * 30 + s.ph));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
          ctx.fillStyle = s.c + Math.floor(o*255).toString(16).padStart(2,'0');
          ctx.fill();
        });

        // Shooting stars
        spawnShooter();
        shooters = shooters.filter(s => s.life > 0);
        shooters.forEach(s => {
          s.tail.push({x:s.x, y:s.y, life:s.life});
          if (s.tail.length > 18) s.tail.shift();
          s.x += s.vx; s.y += s.vy; s.life -= 0.045;
          // Draw tail
          s.tail.forEach((pt, i) => {
            const pct = i/s.tail.length;
            ctx.beginPath(); ctx.arc(pt.x, pt.y, pct*1.5, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,240,' + (pt.life*pct*0.9) + ')';
            ctx.fill();
          });
          // Draw head
          ctx.beginPath(); ctx.arc(s.x, s.y, 1.8, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(255,255,255,' + s.life + ')';
          ctx.fill();
        });
      }
      _chatRaf = requestAnimationFrame(draw);
    }
    draw();
  }

  // ── Load messages ──────────────────────────────────────────────────────────
  async function _loadMsgs() {
    const coupleId = AppAuth.currentCoupleId(); if (!coupleId) return;

    // Show cached instantly
    const cached = LocalCache.getStale('chat_' + coupleId);
    if (cached && cached.length) { _msgs = cached; _renderMsgs(); }

    try {
      const rows = await DB.get('messages', {
        eq: [['couple_id', coupleId]],
        order: ['created_at', {ascending: false}],
        limit: 80
      });
      _msgs = (rows || []).reverse();
      LocalCache.set('chat_' + coupleId, _msgs);
      _renderMsgs(true);
      _updateStatus();
    } catch(e) { console.error('chat load', e); }
  }

  function _renderMsgs(scroll) {
    const inner = document.getElementById('chat-msgs-inner');
    if (!inner) return;
    const userId = State.get('profile')?.id;
    const partner = State.get('partner');
    const user = State.get('profile');

    if (!_msgs.length) {
      const lang = State.get('profile')?.lang || 'en';
      inner.innerHTML = '<div style="text-align:center;padding:30px 20px;font-family:\'Caveat\',cursive;font-size:1.15rem;color:var(--muted);line-height:1.8">' +
        (lang==='ru'?'Начни разговор…\nПервое сообщение всегда особенное ✨':'Start the conversation…\nThe first message is always special ✨') +
      '</div>';
      return;
    }

    let html = '';
    let lastDate = null;
    _msgs.forEach((m, i) => {
      const isMe = m.user_id === userId;
      const prev = _msgs[i-1];
      const sameUser = prev && prev.user_id === m.user_id;
      const msgDate = new Date(m.created_at).toDateString();

      // Date separator
      if (msgDate !== lastDate) {
        lastDate = msgDate;
        const d = new Date(m.created_at);
        const today = new Date().toDateString();
        const yesterday = new Date(Date.now()-86400000).toDateString();
        const label = msgDate === today ? 'Today' : msgDate === yesterday ? 'Yesterday' : d.toLocaleDateString('en',{month:'short',day:'numeric'});
        html += '<div style="text-align:center;margin:14px 0 8px;position:relative">' +
          '<span style="background:var(--glass2);border:1px solid var(--border);color:var(--muted);font-size:.6rem;padding:3px 10px;border-radius:20px;position:relative;z-index:1">' + label + '</span>' +
        '</div>';
      }

      const time = new Date(m.created_at).toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit'});
      const emoji = isMe ? (user?.emoji||'😊') : (partner?.emoji||'👤');
      const showAvatar = !sameUser || msgDate !== (prev ? new Date(prev.created_at).toDateString() : '');
      const mb = (!_msgs[i+1] || _msgs[i+1]?.user_id !== m.user_id) ? '10px' : '2px';

      html += '<div style="display:flex;flex-direction:' + (isMe?'row-reverse':'row') + ';align-items:flex-end;gap:7px;margin-bottom:' + mb + '">';

      // Avatar
      html += '<div style="width:28px;flex-shrink:0;' + (showAvatar?'':'visibility:hidden') + '">';
      if (showAvatar) {
        html += '<div style="width:28px;height:28px;border-radius:50%;background:' +
          (isMe?'linear-gradient(135deg,rgba(232,168,74,.3),rgba(240,160,96,.2))':'linear-gradient(135deg,rgba(224,120,144,.3),rgba(167,139,250,.2))') +
          ';display:flex;align-items:center;justify-content:center;font-size:.9rem;border:1px solid ' +
          (isMe?'rgba(232,168,74,.2)':'rgba(224,120,144,.2)') + '">' + emoji + '</div>';
      }
      html += '</div>';

      // Bubble
      const bubbleColor = isMe
        ? 'background:linear-gradient(135deg,rgba(232,168,74,.2),rgba(240,160,96,.15));border:1px solid rgba(232,168,74,.25)'
        : 'background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.03));border:1px solid rgba(255,255,255,.1)';

      html += '<div style="max-width:70%;' + bubbleColor + ';border-radius:' +
        (isMe?'18px 4px 18px 18px':'4px 18px 18px 18px') +
        ';padding:9px 13px;position:relative;backdrop-filter:blur(10px)">';
      html += '<div style="font-size:.9rem;line-height:1.5;color:var(--text);word-break:break-word">' + Utils.escHtml(m.content) + '</div>';
      html += '<div style="font-size:.55rem;color:var(--dim);margin-top:3px;text-align:' + (isMe?'right':'left') + '">' + time + '</div>';
      html += '</div></div>';
    });

    inner.innerHTML = html;
    if (scroll) {
      const area = document.getElementById('chat-msgs');
      if (area) area.scrollTop = area.scrollHeight;
    }

    const cnt = document.getElementById('chat-count');
    if (cnt) cnt.textContent = _msgs.length + ' msgs';
  }

  function _resize(el) {
    if (!el) return;
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    _onTyping();
  }

  // ── Send ───────────────────────────────────────────────────────────────────
  async function send() {
    const inp = document.getElementById('chat-in');
    if (!inp) return;
    const text = inp.value.trim();
    if (!text) return;
    const user = State.get('profile');
    const coupleId = AppAuth.currentCoupleId();
    if (!user || !coupleId) return;

    inp.value = ''; inp.style.height = 'auto';

    // Optimistic — show immediately
    const tempMsg = { id: 'temp_' + Date.now(), couple_id: coupleId, user_id: user.id, content: text, created_at: new Date().toISOString() };
    _msgs.push(tempMsg);
    _renderMsgs(true);

    try {
      const saved = await DB.insert('messages', { couple_id: coupleId, user_id: user.id, content: text });
      // Replace temp with real
      const idx = _msgs.findIndex(m => m.id === tempMsg.id);
      if (idx !== -1) _msgs[idx] = saved;
      LocalCache.set('chat_' + coupleId, _msgs);
      _renderMsgs(false);
      // Broadcast via realtime
      if (_channel) _channel.send({type:'broadcast',event:'msg',payload:{msg:saved}}).catch(()=>{});
      // KM
      if (typeof KM !== 'undefined' && text.length >= 50) KM.addMessage && KM.addMessage();
    } catch(e) {
      _msgs = _msgs.filter(m => m.id !== tempMsg.id);
      _renderMsgs(false);
      if (window.toast) toast('⚠️ ' + e.message);
    }
  }

  function _onKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  // ── Typing indicator ───────────────────────────────────────────────────────
  let _typingTimer = null;
  function _onTyping() {
    const coupleId = AppAuth.currentCoupleId(); if (!coupleId) return;
    const uid = State.get('profile')?.id;
    try { DB.setSetting(coupleId, 'typing_' + uid, JSON.stringify({ts:Date.now()})); } catch {}
    clearTimeout(_typingTimer);
    _typingTimer = setTimeout(() => {
      try { DB.setSetting(coupleId, 'typing_' + uid, JSON.stringify({ts:0})); } catch {}
    }, 2500);
  }

  // ── Realtime ───────────────────────────────────────────────────────────────
  function _initRealtime() {
    const coupleId = AppAuth.currentCoupleId(); if (!coupleId) return;
    try {
      _channel = DB.client().channel('chat-' + coupleId);
      _channel.on('broadcast', {event:'msg'}, ({payload:p}) => {
        if (!p?.msg) return;
        const myId = State.get('profile')?.id;
        if (p.msg.user_id === myId) return; // Already shown optimistically
        if (_msgs.find(m => m.id === p.msg.id)) return;
        _msgs.push(p.msg);
        const coupleId = AppAuth.currentCoupleId();
        LocalCache.set('chat_' + coupleId, _msgs);
        _renderMsgs(true);
      });
      _channel.subscribe();
    } catch {}
  }

  function _startPolling() {
    if (_pollTimer) clearInterval(_pollTimer);
    _pollTimer = setInterval(async () => {
      if (Router.current() !== 'chat') { clearInterval(_pollTimer); return; }
      const coupleId = AppAuth.currentCoupleId(); if (!coupleId) return;
      try {
        // Only load new messages since last one
        const last = _msgs[_msgs.length-1];
        let query = { eq:[['couple_id', coupleId]], order:['created_at',{ascending:true}], limit:20 };
        const rows = await DB.get('messages', query);
        if (!rows || !rows.length) return;
        let changed = false;
        rows.forEach(m => {
          if (!_msgs.find(x => x.id === m.id)) { _msgs.push(m); changed = true; }
        });
        if (changed) {
          LocalCache.set('chat_' + coupleId, _msgs);
          _renderMsgs(true);
        }
        // Check typing
        const partner = State.get('partner');
        if (partner) {
          const raw = await DB.getSetting(coupleId, 'typing_' + partner.user_id);
          const typing = document.getElementById('chat-typing');
          if (typing && raw) {
            const d = JSON.parse(raw);
            if (Date.now() - d.ts < 3000) {
              typing.textContent = (partner.emoji||'') + ' ' + partner.display_name + ' is typing…';
            } else { typing.textContent = ''; }
          }
        }
      } catch {}
    }, 8000);
  }

  async function _checkOnline() {
    const coupleId = AppAuth.currentCoupleId(); if (!coupleId) return;
    const uid = State.get('profile')?.id;
    // Mark myself online
    try { await DB.setSetting(coupleId, 'last_seen_' + uid, JSON.stringify({ts:Date.now()})); } catch {}
    // Check partner
    const partner = State.get('partner');
    if (!partner) return;
    try {
      const raw = await DB.getSetting(coupleId, 'last_seen_' + partner.user_id);
      const dot = document.getElementById('chat-dot');
      const lbl = document.getElementById('chat-status');
      if (!raw) return;
      const diff = Date.now() - JSON.parse(raw).ts;
      if (dot && lbl) {
        if (diff < 3*60000) { dot.style.background='var(--mint)'; lbl.textContent='Online now'; }
        else if (diff < 30*60000) { dot.style.background='var(--amber)'; lbl.textContent='Recently active'; }
        else { dot.style.background='var(--dim)'; lbl.textContent='Offline'; }
      }
    } catch {}
  }

  function _updateStatus() {
    const lang = State.get('profile')?.lang || 'en';
    const el = document.getElementById('chat-status');
    if (el && el.textContent.includes('Loading')) el.textContent = _msgs.length + ' messages';
    _checkOnline();
  }

  return { init, send, _onKey, _onTyping, _resize };
})();


// ── DIARY PAGE ────────────────────────────────────────────────────────────────
const PageDiary = (() => {
  const MOODS = [
    {emoji:'😍',key:'happy'},{emoji:'🥰',key:'love'},{emoji:'😌',key:'calm'},
    {emoji:'😢',key:'sad'},{emoji:'🌙',key:'nostalgic'},{emoji:'✨',key:'magic'},
    {emoji:'🔥',key:'passion'},{emoji:'💫',key:'dream'},{emoji:'🌸',key:'sweet'},{emoji:'🌊',key:'free'},
  ];
  let _selMood = 'happy';

  function _skeleton() {
    return '<div class="page-title display">Diary 📔</div>' +
      '<div class="page-sub">Shared memories</div>' +
      '<div style="padding:0 16px 16px"><div style="height:44px;background:var(--surface2);border-radius:var(--r-sm);animation:pulse 1.5s infinite"></div></div>' +
      '<div style="padding:0 12px;display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
        Array(4).fill('<div style="height:120px;background:var(--surface2);border-radius:var(--r-sm);animation:pulse 1.5s infinite"></div>').join('') +
      '</div>';
  }

  async function init(container) {
    const lang = State.get('profile')?.lang || 'en';

    // Show stale cache instantly
    const cached = LocalCache.getStale('diary');
    if (cached) {
      _render(container, cached, lang);
    } else {
      container.innerHTML = _skeleton();
    }

    // Load fresh in background
    const coupleId = AppAuth.currentCoupleId();
    if (!coupleId) { _render(container, [], lang); return; }

    try {
      const entries = await DB.get('diary', {
        eq: [['couple_id', coupleId]],
        order: ['created_at', { ascending: false }]
      }) || [];
      LocalCache.set('diary', entries);
      _render(container, entries, lang);
    } catch(e) {
      console.error('diary', e);
      if (!cached) container.innerHTML += '<div style="padding:12px 16px;color:var(--rose);font-size:.8rem">⚠️ ' + e.message + '</div>';
    }
  }

  function _render(container, entries, lang) {
    const user    = State.get('profile');
    const partner = State.get('partner');
    const mine    = entries.filter(e => e.user_id === user?.id);
    const theirs  = entries.filter(e => e.user_id !== user?.id);

    let html = '<div class="page-title display">' + (lang==='ru'?'Дневник 📔':'Diary 📔') + '</div>';
    html += '<div class="page-sub">' + (lang==='ru'?'Общие воспоминания':'Shared memories') + '</div>';
    html += '<div style="padding:0 16px 16px"><button class="btn btn-primary btn-full" onclick="PageDiary._showWrite()">' +
      (lang==='ru'?'✏️ Новая запись':'✏️ New entry') + '</button></div>';

    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:0;padding:0 12px 20px">';

    // My column
    html += '<div style="padding-right:6px">';
    html += '<div style="font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 2px 6px;border-bottom:2px solid var(--amber);margin-bottom:8px;opacity:.8;color:var(--amber)">' +
      (user?.emoji||'😊') + ' ' + (user?.display_name||'You') + '</div>';
    if (mine.length) {
      mine.forEach(e => { html += _card(e, true); });
    } else {
      html += '<div style="text-align:center;padding:20px 8px;color:var(--muted);font-family:\'Caveat\',cursive;font-size:1rem">' +
        (lang==='ru'?'Ещё ничего не написал ✍️':'Write something today ✍️') + '</div>';
    }
    html += '</div>';

    // Partner column
    html += '<div style="padding-left:6px">';
    html += '<div style="font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:6px 2px 6px;border-bottom:2px solid var(--rose);margin-bottom:8px;opacity:.8;color:var(--rose)">' +
      (partner?.emoji||'❤️') + ' ' + (partner?.display_name||(lang==='ru'?'Пара':'Partner')) + '</div>';
    if (theirs.length) {
      theirs.forEach(e => { html += _card(e, false); });
    } else {
      html += '<div style="text-align:center;padding:20px 8px;color:var(--muted);font-family:\'Caveat\',cursive;font-size:1rem">' +
        (lang==='ru'?'Ещё ничего не написала 🌙':'Nothing yet 🌙') + '</div>';
    }
    html += '</div>';

    html += '</div>';
    container.innerHTML = html;
  }

  function _card(e, isMine) {
    const mood = MOODS.find(m => m.key === e.mood) || MOODS[0];
    const date = new Date(e.created_at).toLocaleDateString('en', {day:'numeric',month:'short',year:'numeric'});
    return '<div style="background:var(--card);border:1px solid var(--border);border-left:3px solid ' +
      (isMine?'var(--amber)':'var(--rose)') +
      ';border-radius:3px 12px 12px 3px;padding:12px 10px;cursor:pointer;margin-bottom:8px;position:relative;overflow:hidden" onclick="PageDiary._open(\'' + e.id + '\')">' +
      '<div style="position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 14px 14px 0;border-color:transparent var(--surface2) transparent transparent"></div>' +
      '<div style="font-size:1.1rem;margin-bottom:3px">' + mood.emoji + '</div>' +
      '<div style="font-size:.6rem;color:var(--muted);margin-bottom:3px">' + date + '</div>' +
      (e.title ? '<div style="font-family:\'Cormorant Garamond\',serif;font-size:.9rem;font-weight:500;margin-bottom:4px">' + Utils.escHtml(e.title) + '</div>' : '') +
      '<div style="font-size:.82rem;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;font-family:\'Caveat\',cursive">' +
      Utils.escHtml(e.content) + '</div>' +
      (e.tags?.length ? '<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:3px">' +
        e.tags.map(t=>'<span style="font-size:.55rem;color:var(--lav);background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);border-radius:20px;padding:1px 5px">#'+t+'</span>').join('') +
      '</div>' : '') +
      '<div style="position:absolute;bottom:0;left:0;right:0;height:2px;background:repeating-linear-gradient(90deg,var(--border) 0,var(--border) 60%,transparent 60%,transparent 100%);background-size:8px 1px"></div>' +
    '</div>';
  }

  // Store entries for _open
  let _entries = [];
  const _origRender = _render;

  function _open(id) {
    const cached = LocalCache.getStale('diary') || [];
    const e = cached.find(x => x.id === id);
    if (!e) return;
    const mood = MOODS.find(m => m.key === e.mood) || MOODS[0];
    Modal.show({
      title: mood.emoji + ' ' + (e.title || 'Entry'),
      content: '<div style="font-size:.7rem;color:var(--muted);margin-bottom:12px">' +
        (e.user_emoji||'') + ' ' + (e.user_name||'') + ' · ' +
        new Date(e.created_at).toLocaleDateString('en',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) +
        '</div>' +
        '<div style="font-family:\'Caveat\',cursive;font-size:1.15rem;line-height:1.8;color:var(--text);white-space:pre-wrap">' +
        Utils.escHtml(e.content) + '</div>' +
        (e.tags?.length ? '<div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:4px">' +
          e.tags.map(t=>'<span style="font-size:.7rem;color:var(--lav);background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.2);border-radius:20px;padding:2px 8px">#'+t+'</span>').join('') +
        '</div>' : '')
    });
  }

  function _showWrite() {
    const lang = State.get('profile')?.lang || 'en';
    _selMood = 'happy';
    const moodGrid = MOODS.map(m =>
      '<div style="background:var(--surface);border:2px solid ' + (m.key===_selMood?'var(--amber)':'var(--border)') + ';border-radius:var(--r-sm);padding:7px 3px;text-align:center;cursor:pointer;transition:all .18s;font-size:1.3rem" ' +
      'onclick="PageDiary._pickMood(\'' + m.key + '\',this)">' + m.emoji + '</div>'
    ).join('');

    Modal.show({
      title: lang==='ru'?'✏️ Новая запись':'✏️ New entry',
      content: '<div class="form-group"><label class="input-label">' + (lang==='ru'?'Как ты себя чувствуешь?':'How are you feeling?') + '</label>' +
        '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:4px" id="mood-grid">' + moodGrid + '</div></div>' +
        '<div class="form-group"><label class="input-label">' + (lang==='ru'?'Заголовок (необязательно)':'Title (optional)') + '</label>' +
        '<input class="input-field" id="e-title" placeholder="' + (lang==='ru'?'Сегодня был особенный день...':'Today was special...') + '"></div>' +
        '<div class="form-group"><label class="input-label">' + (lang==='ru'?'Напиши':'Write') + '</label>' +
        '<textarea class="input-field" id="e-content" placeholder="' + (lang==='ru'?'Дорогой дневник...':'Dear diary...') + '" ' +
        'style="min-height:140px;resize:vertical;font-family:\'Caveat\',cursive;font-size:1.1rem;line-height:1.9;background-image:repeating-linear-gradient(transparent,transparent 31px,var(--border) 31px,var(--border) 32px)"></textarea></div>' +
        '<div class="form-group"><label class="input-label">' + (lang==='ru'?'Теги':'Tags') + '</label>' +
        '<input class="input-field" id="e-tags" placeholder="' + (lang==='ru'?'любовь, воспоминание':'love, memory') + '"></div>',
      footer: '<button class="btn btn-primary btn-full" onclick="PageDiary._save()">' + (lang==='ru'?'💾 Сохранить':'💾 Save entry') + '</button>'
    });
  }

  function _pickMood(key, el) {
    _selMood = key;
    document.querySelectorAll('.mood-opt').forEach(e => {
      e.classList.remove('active');
      e.style.borderColor = 'var(--border)';
    });
    if (el) { el.classList.add('active'); el.style.borderColor = 'var(--amber)'; }
  }

  async function _save() {
    const title   = Utils.el('e-title')?.value?.trim();
    const content = Utils.el('e-content')?.value?.trim();
    const tagsRaw = Utils.el('e-tags')?.value?.trim();
    if (!content) { if (window.toast) toast(State.get('profile')?.lang==='ru'?'Сначала напиши что-нибудь':'Write something first'); return; }
    const user    = State.get('profile');
    const coupleId= AppAuth.currentCoupleId();
    if (!user || !coupleId) { if (window.toast) toast('⚠️ No session'); return; }
    const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : [];
    try {
      const entry = await DB.insert('diary', {
        couple_id: coupleId, user_id: user.id,
        user_name: user.display_name, user_emoji: user.emoji,
        title, content, mood: _selMood, tags
      });
      // Update cache
      const cached = LocalCache.getStale('diary') || [];
      cached.unshift(entry);
      LocalCache.set('diary', cached);
      State.invalidate('diary');
      Modal.close();
      if (window.toast) toast('📔 ' + (user.lang==='ru'?'Запись сохранена':'Entry saved'));
      if (typeof KM !== 'undefined') KM.addDiary();
      // Re-render
      const c = document.getElementById('page-diary');
      if (c) _render(c, cached, user.lang || 'en');
    } catch(e) {
      if (window.toast) toast('⚠️ ' + e.message);
    }
  }

  return { init, _open, _showWrite, _save, _pickMood };
})();


// ── LIBRARY PAGE ──────────────────────────────────────────────────────────────
const PageLibrary = (() => {

      '<div style="padding:0 16px 12px"><div style="height:44px;background:var(--surface2);border-radius:var(--r-sm);animation:pulse 1.5s infinite"></div></div>' +

    const cached = LocalCache.getStale('library');
    if (cached) _render(container, cached);
    else container.innerHTML = _skeleton();

    const coupleId = AppAuth.currentCoupleId();
    if (!coupleId) { _render(container, []); return; }
    try {
      const books = await DB.get('books', {
        eq: [['couple_id', coupleId]],
        order: ['created_at', { ascending: false }]
      });
      LocalCache.set('library', books || []);
      _render(container, books || []);
    } catch(e) {
      console.error('library', e);
      if (!cached) _render(container, []);
    }
  }

  function _render(container, books) {
    const lang = State.get('profile')?.lang || 'en';
    let html = '<div class="page-title display">' + (lang==='ru'?'Библиотека 📚':'Library 📚') + '</div>';
    html += '<div class="page-sub">' + (lang==='ru'?'Ваши книги вместе':'Your shared books') + '</div>';
    html += '<div style="padding:0 16px 16px">' +
      '<button class="btn btn-primary btn-full" onclick="PageLibrary._showAdd()">' +
        (lang==='ru'?'📚 Добавить книгу':'📚 Add a book') +
      '</button></div>';

    if (!books.length) {
      html += '<div style="padding:40px 20px;text-align:center">' +
        '<div style="font-size:3rem;margin-bottom:12px;opacity:.3">📚</div>' +
        '<div style="font-size:.9rem;color:var(--muted);margin-bottom:6px">' + (lang==='ru'?'Нет книг пока':'No books yet') + '</div>' +
        '<div style="font-size:.78rem;color:var(--dim)">' + (lang==='ru'?'Добавь книгу и загрузи PDF':'Add a book and upload its PDF') + '</div>' +
      '</div>';
    } else {
      books.forEach(b => {

        html += '<div class="card" style="display:flex;align-items:center;gap:14px;cursor:pointer;margin-bottom:8px" onclick="PageLibrary._open(' + JSON.stringify(JSON.stringify(b)).slice(1,-1) + ')">' +
          '<div style="width:48px;height:48px;background:linear-gradient(135deg,var(--amber-s),var(--rose-s));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0">' + (b.emoji||'📖') + '</div>' +
          '<div style="flex:1;min-width:0">' +
            '<div style="font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + Utils.escHtml(b.title) + '</div>' +
            '<div style="font-size:.72rem;color:var(--muted);margin-bottom:6px">' + Utils.escHtml(b.author||'') + '</div>' +
            '<div style="height:4px;background:var(--surface2);border-radius:2px;overflow:hidden">' +
              '<div style="height:100%;width:' + pct + '%;background:linear-gradient(90deg,var(--amber),var(--rose));border-radius:2px;transition:width .5s"></div>' +
            '</div>' +
            '<div style="font-size:.6rem;color:var(--muted);margin-top:2px">' + pct + '% read</div>' +
          '</div>' +
          '<button onclick="event.stopPropagation();PageLibrary._delete(\'' + b.id + '\')" style="width:28px;height:28px;border-radius:50%;background:var(--surface2);border:none;color:var(--muted);cursor:pointer;flex-shrink:0;font-size:.65rem">✕</button>' +
        '</div>';
      });
    }
    container.innerHTML = html;
  }

  function _showAdd() {
    const lang = State.get('profile')?.lang || 'en';
    Modal.show({
      title: lang==='ru'?'📚 Добавить книгу':'📚 Add a book',
      content:
        '<div class="form-group"><label class="input-label">Title *</label>' +
        '<input class="input-field" id="bk-title" placeholder="' + (lang==='ru'?'Название':'Book title') + '" autocomplete="off"></div>' +
        '<div class="form-group"><label class="input-label">Author</label>' +
        '<input class="input-field" id="bk-author" placeholder="' + (lang==='ru'?'Автор':'Author') + '"></div>' +
        '<div class="form-group"><label class="input-label">Emoji</label>' +
        '<input class="input-field" id="bk-emoji" placeholder="📖" style="font-size:1.5rem;text-align:center" maxlength="4" value="📖"></div>' +
        '<div class="form-group"><label class="input-label">Your PDF (optional)</label>' +
        '<div id="pdf-drop-a" style="border:1.5px dashed var(--border2);border-radius:var(--r-sm);padding:14px;text-align:center;cursor:pointer;font-size:.8rem;color:var(--muted)" ' +
        'onclick="document.getElementById(\'bk-file-a\').click()" ' +
        'ondragover="event.preventDefault();this.style.borderColor=\'var(--amber)\'" ' +
        'ondragleave="this.style.borderColor=\'\'" ' +
        'ondrop="event.preventDefault();this.style.borderColor=\'\';PageLibrary._handleFileDrop(event,\'a\')">' +
        '📄 Click or drag PDF here</div>' +
        '<input type="file" id="bk-file-a" accept=".pdf,.txt" style="display:none" onchange="PageLibrary._handleFile(event,\'a\')"></div>' +
        '<div class="form-group"><label class="input-label">Partner\'s PDF (optional)</label>' +
        '<div id="pdf-drop-b" style="border:1.5px dashed var(--border2);border-radius:var(--r-sm);padding:14px;text-align:center;cursor:pointer;font-size:.8rem;color:var(--muted)" ' +
        'onclick="document.getElementById(\'bk-file-b\').click()" ' +
        'ondragover="event.preventDefault();this.style.borderColor=\'var(--amber)\'" ' +
        'ondragleave="this.style.borderColor=\'\'" ' +
        'ondrop="event.preventDefault();this.style.borderColor=\'\';PageLibrary._handleFileDrop(event,\'b\')">' +
        '📄 Click or drag PDF here (translated version)</div>' +
        '<input type="file" id="bk-file-b" accept=".pdf,.txt" style="display:none" onchange="PageLibrary._handleFile(event,\'b\')">',
      footer: '<button class="btn btn-primary btn-full" onclick="PageLibrary._save()">💾 Save book</button>'
    });
    // Store pending files
    PageLibrary._pendingFiles = { a: null, b: null };
  }

  function _handleFile(e, pane) {
    const f = e.target.files[0]; if (!f) return;
    PageLibrary._pendingFiles = PageLibrary._pendingFiles || {};
    PageLibrary._pendingFiles[pane] = f;
    const dropEl = document.getElementById('pdf-drop-' + pane);
    if (dropEl) { dropEl.style.borderColor='var(--mint)'; dropEl.textContent='✓ ' + f.name; }
  }

  function _handleFileDrop(e, pane) {
    const f = e.dataTransfer.files[0]; if (!f) return;
    PageLibrary._pendingFiles = PageLibrary._pendingFiles || {};
    PageLibrary._pendingFiles[pane] = f;
    const dropEl = document.getElementById('pdf-drop-' + pane);
    if (dropEl) { dropEl.style.borderColor='var(--mint)'; dropEl.textContent='✓ ' + f.name; }
  }

  async function _save() {
    const title  = Utils.el('bk-title')?.value?.trim();
    const author = Utils.el('bk-author')?.value?.trim();
    const emoji  = Utils.el('bk-emoji')?.value?.trim() || '📖';
    const lang   = State.get('profile')?.lang || 'en';
    if (!title) { if (window.toast) toast(lang==='ru'?'Введи название':'Enter a title'); return; }

    const btn = document.querySelector('#modal-overlay .btn-primary');
    if (btn) { btn.textContent = 'Saving...'; btn.disabled = true; }

    const coupleId = AppAuth.currentCoupleId();
    if (!coupleId) { if (window.toast) toast('⚠️ No couple found'); return; }

    try {
      let fileUrlA = null, fileUrlB = null;
      const files = PageLibrary._pendingFiles || {};

      if (files.a instanceof File) {
        try { fileUrlA = await DB.uploadFile('pdfs', coupleId+'/'+Date.now()+'-a-'+files.a.name, files.a); } catch(e) { console.warn('upload A', e); }
      }
      if (files.b instanceof File) {
        try { fileUrlB = await DB.uploadFile('pdfs', coupleId+'/'+Date.now()+'-b-'+files.b.name, files.b); } catch(e) { console.warn('upload B', e); }
      }

      const book = await DB.insert('books', {
        couple_id: coupleId, title, author, emoji,
        file_url: fileUrlA, file_url_translated: fileUrlB, progress_pct: 0
      });

      const cached = LocalCache.getStale('library') || [];
      cached.unshift(book);
      LocalCache.set('library', cached);
      State.invalidate && State.invalidate('library');
      Modal.close();
      if (window.toast) toast('📚 ' + (lang==='ru'?'Книга добавлена':'Book added'));

      const c = document.getElementById('page-library');
      if (c) _render(c, cached);
    } catch(e) {
      console.error('save book', e);
      if (window.toast) toast('⚠️ ' + e.message);
      if (btn) { btn.textContent = '💾 Save book'; btn.disabled = false; }
    }
  }

  async function _open(bookJson) {
    let book;
    try { book = typeof bookJson === 'string' ? JSON.parse(bookJson) : bookJson; } catch { return; }
    State.set('currentBook', book);
    LocalCache.set('current_book', book);
    const coupleId = AppAuth.currentCoupleId();
    if (coupleId) {
      try { await DB.setSetting(coupleId, 'current_book_id', book.id); } catch {}
    }
    Router.go('reader');
  }

  async function _delete(id) {
    const lang = State.get('profile')?.lang || 'en';
    if (!confirm(lang==='ru'?'Удалить книгу?':'Delete this book?')) return;
    try {
      await DB.remove('books', { id });
      const cached = (LocalCache.getStale('library') || []).filter(b => b.id !== id);
      LocalCache.set('library', cached);
      const c = document.getElementById('page-library');
      if (c) _render(c, cached);
      if (window.toast) toast('🗑 ' + (lang==='ru'?'Удалено':'Deleted'));
    } catch(e) { if (window.toast) toast('⚠️ ' + e.message); }
  }

  return { init, _showAdd, _save, _open, _delete, _handleFile, _handleFileDrop };
})();

  // ── Drop ───────────────────────────────────────────────────────────────────

  }

  function _onFile(e, pane) { var f=e.target.files[0]; if(f) _loadDoc(pane,null,f); }

  // ── Load ───────────────────────────────────────────────────────────────────
  async function _loadDoc(pane, url, file) {
    var ext = (file?file.name:url||'').split('.').pop().toLowerCase();
    if (ext==='txt') return _loadTXT(pane,url,file);
    return _loadPDF(pane,url,file);
  }

  async function _loadPDF(pane, url, file) {
    var wrap = document.getElementById('canvas-wrap-' + pane);
    if (!wrap) return;
    wrap.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;height:100%;color:var(--muted);font-size:.8rem"><div class="rdz-spinner"></div>Cargando PDF…</div>';
    try {
      var src;
      if (file instanceof File) {
        var buf = await new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result);};r.onerror=rej;r.readAsArrayBuffer(file);});
        src = {data:buf};
        S[pane].url = null; // local file, no URL
      } else {
        var resp = await fetch(url); var buf2 = await resp.arrayBuffer(); src={data:buf2};
        S[pane].url = url;
      }
      var pdf = await pdfjsLib.getDocument(src).promise;
      S[pane].type='pdf'; S[pane].pdf=pdf; S[pane].tot=pdf.numPages;
      var saved = await _loadSavedPage(pane);
      S[pane].cur = saved || 1;
      wrap.innerHTML = '<canvas id="cv-'+pane+'" style="display:block;max-width:100%;max-height:100%;object-fit:contain"></canvas>';
      await _renderPDF(pane);
      _afterLoad(pane);
    } catch(e) {
      wrap.innerHTML = '<div style="padding:20px;text-align:center;color:var(--rose);font-size:.78rem">⚠️ '+e.message+'</div>';
    }
  }

  async function _loadTXT(pane, url, file) {
    try {
      var text;
      if (file instanceof File) { text = await new Promise(function(res,rej){var r=new FileReader();r.onload=function(){res(r.result);};r.onerror=rej;r.readAsText(file,'utf-8');}); }
      else { text = await fetch(url).then(function(r){return r.text();}); }
      var pages=[]; for(var i=0;i<text.length;i+=1800) pages.push(text.slice(i,i+1800));
      S[pane].type='txt'; S[pane].pages=pages; S[pane].tot=pages.length;
      var saved = await _loadSavedPage(pane);
      S[pane].cur = saved || 1;
      var wrap = document.getElementById('canvas-wrap-' + pane);
      if (wrap) wrap.innerHTML = '<div id="txt-'+pane+'" style="height:100%;overflow-y:auto;padding:20px;font-family:\'Cormorant Garamond\',serif;font-size:1.05rem;line-height:1.9;color:var(--text2);white-space:pre-wrap"></div>';
      _renderTXT(pane);
      _afterLoad(pane);
    } catch(e) {
      var w=document.getElementById('canvas-wrap-'+pane);
      if(w) w.innerHTML='<div style="padding:20px;color:var(--rose)">⚠️ '+e.message+'</div>';
    }
  }

  async function _renderPDF(pane) {
    var s=S[pane]; if(!s.pdf||s.rendering)return; s.rendering=true;
    var canvas=document.getElementById('cv-'+pane);
    var wrap=document.getElementById('canvas-wrap-'+pane);
    if(!canvas||!wrap){s.rendering=false;return;}
    try {
      var page=await s.pdf.getPage(s.cur);
      var W=wrap.clientWidth, H=wrap.clientHeight;
      var vp0=page.getViewport({scale:1});
      // Fit to height primarily (so whole page visible), then constrain by width
      var scaleH = H / vp0.height;
      var scaleW = W / vp0.width;
      var scale  = Math.min(scaleH, scaleW) * 0.97; // 3% margin
      var vp=page.getViewport({scale:Math.max(scale,0.4)});
      canvas.width=vp.width; canvas.height=vp.height;
      canvas.style.maxWidth='100%'; canvas.style.maxHeight='100%';
      // Center the canvas
      canvas.style.display='block';
      canvas.style.margin='auto';
      canvas.style.position='absolute';
      canvas.style.top='50%'; canvas.style.left='50%';
      canvas.style.transform='translate(-50%,-50%)';
      await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
    } catch(e){console.error('render',e);}
    s.rendering=false;
  }

  function _renderTXT(pane) {
    var el=document.getElementById('txt-'+pane); if(!el)return;
    el.textContent=S[pane].pages[S[pane].cur-1]||'';
  }

  function _afterLoad(pane) {
    _updateInfo(pane);
    _showProgBars();
    _updateLinkedUI();
    _showReadyBtn(pane);
    // Show nav buttons for B when it has content
    if (pane === 'b' && !_linked) {
      ['prev-b','pg-b','next-b'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.display='';});
    }
  }

  function _updateInfo(pane) {
    var s=S[pane];
    var pg=document.getElementById('pg-'+pane);
    var tot=document.getElementById('tot-'+pane);
    if(pg)  {pg.value=s.cur; pg.max=s.tot||999;}
    if(tot) tot.textContent = s.tot ? ('/ '+s.tot) : '';

    // Update topbar my info
    if(pane===_myPane) {
      var el=document.getElementById('bar-my-info');
      if(el) el.textContent = s.tot ? (s.cur+'/'+s.tot) : '—/—';
    }
    _updateProgressBars();
  }

  function _showProgBars() {
    var wrap=document.getElementById('reader-prog');
    if(wrap) wrap.style.display='';
    var user=State.get('profile');
    var partner=State.get('partner');
    var myLbl=document.getElementById('prog-my-lbl');
    var ptLbl=document.getElementById('prog-partner-lbl');
    if(myLbl&&user)    myLbl.textContent=(user.emoji||'😊')+' '+(user.display_name||'Tú').slice(0,8);
    if(ptLbl&&partner) ptLbl.textContent=(partner.emoji||'👤')+' '+(partner.display_name||'Pareja').slice(0,8);
  }

  function _updateProgressBars() {
    var s=S[_myPane];
    var pct=s.tot>0?Math.round(s.cur/s.tot*100):0;
    var bar=document.getElementById('prog-my'); var el=document.getElementById('prog-my-pct');
    if(bar) bar.style.width=pct+'%'; if(el) el.textContent=pct+'%';
  }

  function _updatePartnerProg(page, total) {
    var pct=total>0?Math.round(page/total*100):0;
    var bar=document.getElementById('prog-partner'); var el=document.getElementById('prog-partner-pct');
    if(bar) bar.style.width=pct+'%'; if(el) el.textContent=pct+'%';
    var badge=document.getElementById('bar-partner-badge');
    var pg=document.getElementById('bar-partner-page');
    if(badge&&total>0){badge.style.display='';} if(pg) pg.textContent=page;
  }

  // ── Navigation ─────────────────────────────────────────────────────────────
  async function _go(pane, delta) {
    var s=S[pane]; if(!s.tot)return;
    var np=Math.max(1,Math.min(s.tot,s.cur+delta));
    if(np===s.cur)return;
    s.cur=np;
    if(s.type==='pdf') await _renderPDF(pane); else _renderTXT(pane);
    _updateInfo(pane);
    _saveProgress(pane);
    _broadcast();
    // Reset ready flags on page change
    _readyA=false; _readyB=false;
    _showReadyBtn(pane);
    var prBar=document.getElementById('partner-ready-bar');
    if(prBar) prBar.style.display='none';
  }

  async function _goTo(pane, page) {
    var s=S[pane]; if(!s.tot)return;
    s.cur=Math.max(1,Math.min(s.tot,page));
    if(s.type==='pdf') await _renderPDF(pane); else _renderTXT(pane);
    _updateInfo(pane);
    _saveProgress(pane);
    _broadcast();
  }

  function _updateLinkedUI() {
    var btnL=document.getElementById('link-btn');
    if(btnL){btnL.textContent=_linked?'🔗':'🔓';btnL.style.color=_linked?'var(--amber)':'var(--muted)';}
    // Show B nav only when not linked and B has content
    if(!_linked && S.b.tot>0) {
      ['prev-b','pg-b','next-b'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.display='';});
    } else {
      ['prev-b','pg-b','next-b'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.display='none';});
    }
  }

  function _toggleLink() {
    _linked=!_linked; _updateLinkedUI();
    if(window.toast) toast(_linked?'🔗 Páginas enlazadas':'🔓 Páginas independientes');
  }

  // ── "Listo / Ready" button ─────────────────────────────────────────────────
  function _showReadyBtn(pane) {
    var s=S[pane]; if(!s.tot)return;
    var btn=document.getElementById('ready-btn-'+pane);
    if(btn) btn.style.display='';
  }

  async function _markReady(pane) {
    // Only allow marking OWN pane (pane 'a' = me)
    if (pane !== _myPane) return;
    var btn = document.getElementById('ready-btn-' + pane);
    var already = (pane === 'a') ? _readyA : _readyB;
    if (already) {
      // Undo ready
      if (pane === 'a') _readyA = false; else _readyB = false;
      if (btn) { btn.style.background = 'rgba(112,200,160,.15)'; btn.textContent = '✓ ' + (State.get('profile')?.lang==='ru'?'Готово':'Done'); }
      return;
    }
    if (btn) { btn.style.background = 'rgba(112,200,160,.35)'; btn.style.borderColor = 'var(--mint)'; btn.textContent = '✓✓ ' + (State.get('profile')?.lang==='ru'?'Готово!':'Done!'); }
    if (pane === 'a') _readyA = true; else _readyB = true;
    var coupleId = AppAuth.currentCoupleId();
    var userId   = State.get('profile')?.id;
    if (!coupleId || !userId) return;
    try {
      await DB.setSetting(coupleId, 'reader_ready', JSON.stringify({by:userId, page:S[pane].cur, ts:Date.now()}));
      if (_channel) _channel.send({type:'broadcast', event:'ready', payload:{by:userId, page:S[pane].cur}}).catch(function(){});
    } catch {}
  }

  // ── Progress persistence ───────────────────────────────────────────────────
  async function _saveProgress(pane) {
    if(!_book)return;
    var coupleId=AppAuth.currentCoupleId(); var userId=State.get('profile')?.id;
    if(!coupleId||!userId)return;
    var s=S[pane]; var pct=s.tot>0?Math.round(s.cur/s.tot*100):0;
    var key='rp_'+_book.id+'_'+userId+'_'+pane;
    try {
      await DB.setSetting(coupleId,key,JSON.stringify({page:s.cur,total:s.tot,pct}));
      if(pane===_myPane) DB.update('books',{id:_book.id},{progress_pct:pct}).catch(function(){});
      if(typeof KM!=='undefined') KM.addPage();
    } catch {}
  }

  async function _loadSavedPage(pane) {
    if(!_book)return null;
    var coupleId=AppAuth.currentCoupleId(); var userId=State.get('profile')?.id;
    if(!coupleId||!userId)return null;
    var key='rp_'+_book.id+'_'+userId+'_'+pane;
    try { var raw=await DB.getSetting(coupleId,key); return raw?JSON.parse(raw).page:null; } catch{return null;}
  }

  async function _loadPartnerProgress() {
    if(!_book)return;
    var coupleId=AppAuth.currentCoupleId(); var partner=State.get('partner');
    if(!coupleId||!partner)return;
    var key='rp_'+_book.id+'_'+partner.user_id+'_a';
    try {
      var raw=await DB.getSetting(coupleId,key);
      if(!raw)return;
      var d=JSON.parse(raw);
      _updatePartnerProg(d.page||1,d.total||0);
    } catch {}
  }

  // ── Realtime ───────────────────────────────────────────────────────────────
  async function _broadcast() {
    var coupleId=AppAuth.currentCoupleId(); if(!coupleId)return;
    var userId=State.get('profile')?.id;
    try {
      await DB.setSetting(coupleId,'reader_sync',JSON.stringify({
        bookId:_book?.id,pageA:S.a.cur,totA:S.a.tot,by:userId,ts:Date.now()
      }));
      if(_channel) _channel.send({type:'broadcast',event:'page',payload:{by:userId,page:S.a.cur,total:S.a.tot}}).catch(function(){});
    } catch {}
  }

  async function _syncNow() {
    await _broadcast();
    if(window.toast) toast('🔄 Sincronizado');
  }

  function _initRealtime() {
    var coupleId=AppAuth.currentCoupleId(); if(!coupleId)return;
    try {
      _channel=DB.client().channel('reader-'+coupleId);
      _channel.on('broadcast',{event:'page'},function(msg){
        var p=msg.payload; var myId=State.get('profile')?.id;
        if(!p||p.by===myId)return;
        _updatePartnerProg(p.page||1,p.total||0);
        if(_linked&&S[_myPane].tot>0&&p.total>0){
          var ratio=(p.page-1)/Math.max(p.total-1,1);
          var target=Math.round(1+ratio*(S[_myPane].tot-1));
          if(target!==S[_myPane].cur){S[_myPane].cur=target;if(S[_myPane].type==='pdf')_renderPDF(_myPane);else _renderTXT(_myPane);_updateInfo(_myPane);}
        }
      });
      _channel.on('broadcast',{event:'ready'},function(msg){
        var p=msg.payload; var myId=State.get('profile')?.id;
        if(!p||p.by===myId)return;
        var partner=State.get('partner');
        var prBar=document.getElementById('partner-ready-bar');
        if(prBar){prBar.style.display='block';setTimeout(function(){if(prBar)prBar.style.display='none';},8000);}
      });
      _channel.subscribe();
    } catch {}
  }

  function _startSync() {
    if(_syncInt) clearInterval(_syncInt);
    _syncInt=setInterval(async function(){
      if(Router.current()!=='reader'){clearInterval(_syncInt);return;}
      var coupleId=AppAuth.currentCoupleId(); if(!coupleId)return;
      try {
        var raw=await DB.getSetting(coupleId,'reader_sync');
        if(!raw)return;
        var sync=JSON.parse(raw); var myId=State.get('profile')?.id;
        if(sync.by===myId)return;
        _updatePartnerProg(sync.pageA||1,sync.totA||0);
        // Check ready
        var rr=await DB.getSetting(coupleId,'reader_ready');
        if(rr){
          var rd=JSON.parse(rr);
          if(rd.by!==myId&&Date.now()-rd.ts<30000){
            var prBar=document.getElementById('partner-ready-bar');
            if(prBar) prBar.style.display='block';
          }
        }
      } catch {}
    },5000);
  }

  return {init,_go,_goTo,_toggleLink,_syncNow,_onFile,_toggleFull,_exitFull,_markReady};
})();


// ── MUSIC PAGE ────────────────────────────────────────────────────────────────
const PageMusic = (() => {
  let _playlist = [];
  let _idx = 0;

  function _skeleton() {
    return '<div class="page-title display">Music 🎵</div><div class="page-sub">Your shared playlist</div>' +
      '<div style="margin:0 16px 12px;height:200px;background:var(--surface2);border-radius:var(--r);animation:pulse 1.5s infinite"></div>' +

      '</div>';

  async function init(container) {

      _playlist = cached;
      _render(container, lang);
    } else {
      container.innerHTML = _skeleton();

          yt: r.url?.startsWith('yt:') ? r.url.slice(3) : null,
          url: r.url?.startsWith('yt:') ? null : r.url
        }));
        LocalCache.set('music', _playlist);
        _render(container, lang);

        console.error('music', e);

      _render(container, lang);

    if (cur && !cur.yt && cur.url) {
      html += '<div style="margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px">' +

        '<div style="font-size:.72rem;color:var(--muted);margin-top:6px;text-align:center">' + Utils.escHtml(cur.title) + '</div>' +
      '</div>';
    }

    // Now playing / empty
    html += '<div class="card" style="background:linear-gradient(135deg,rgba(232,168,74,.08),rgba(224,120,144,.06));border-color:rgba(232,168,74,.2);margin-bottom:10px">';
    html += '<div style="display:flex;align-items:center;gap:12px">';
    html += '<div style="font-size:1.8rem">' + (cur?cur.note:'🎵') + '</div>';
    html += '<div style="flex:1;min-width:0">';
    if (cur) {
      html += '<div style="font-weight:600;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + Utils.escHtml(cur.title) + '</div>';
      html += '<div style="font-size:.72rem;color:var(--muted)">' + (cur.yt?Utils.escHtml(cur.artist||'YouTube'):'🎵 Audio') + '</div>';
    } else {
      html += '<div style="font-size:.85rem;color:var(--muted)">' + (lang==='ru'?'Плейлист пуст':'Playlist is empty') + '</div>';
      html += '<div style="font-size:.72rem;color:var(--dim)">' + (lang==='ru'?'Добавь YouTube или аудио':'Add YouTube or upload audio') + '</div>';
    }
    html += '</div>';
    if (cur) {
      html += '<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">';
      html += '<button onclick="PageMusic._prev()" style="width:30px;height:30px;background:var(--surface2);border-radius:50%;border:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center">◀</button>';
      html += '<button onclick="PageMusic._play()" style="width:40px;height:40px;background:var(--amber);border-radius:50%;border:none;cursor:pointer;color:#000;font-size:1rem;display:flex;align-items:center;justify-content:center" id="mp-play-btn">▶</button>';
      html += '<button onclick="PageMusic._next()" style="width:30px;height:30px;background:var(--surface2);border-radius:50%;border:none;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center">▶▶</button>';
      html += '</div>';
    }
    html += '</div></div>';

    // Playlist
    if (_playlist.length > 0) {
      html += '<div class="section-label">' + (lang==='ru'?'Плейлист · ':'Playlist · ') + _playlist.length + ' ' + (lang==='ru'?(_playlist.length===1?'трек':'треков'):'track' + (_playlist.length!==1?'s':'')) + '</div>';
      _playlist.forEach(function(t, i) {
        html += '<div class="card" style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:6px;' +
          (i===_idx?'border-color:var(--amber);background:var(--amber-s)':'') +
          '" onclick="PageMusic._goto(' + i + ')">' +
          '<div style="width:36px;height:36px;background:var(--surface2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0">' + t.note + '</div>' +
          '<div style="flex:1;min-width:0"><div style="font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + Utils.escHtml(t.title) + '</div>' +
          '<div style="font-size:.68rem;color:var(--muted)">' + (t.yt?'▶ YouTube':'🎵 Audio') + '</div></div>' +
          '<div style="display:flex;align-items:center;gap:5px;flex-shrink:0">' +
          (i===_idx?'<span style="font-size:.6rem;color:var(--amber);font-weight:700">▶</span>':'<span style="font-size:.6rem;color:var(--muted)">'+(i+1)+'</span>') +
          '<button onclick="event.stopPropagation();PageMusic._remove(' + i + ')" style="width:20px;height:20px;border-radius:50%;background:var(--surface2);border:none;color:var(--muted);font-size:.55rem;cursor:pointer">✕</button>' +
          '</div></div>';
      });
    } else {
      html += '<div style="padding:20px;text-align:center"><div style="font-size:2.5rem;opacity:.25;margin-bottom:10px">🎵</div>' +
        '<div style="font-size:.85rem;color:var(--muted)">' + (lang==='ru'?'Плейлист пуст':'Your playlist is empty') + '</div></div>';
    }

    // Add YouTube button
    html += '<div style="padding:4px 16px 8px"><button class="btn btn-ghost btn-full" onclick="PageMusic._showYtModal()" style="gap:8px">' +
      '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58A2.78 2.78 0 0 0 3.41 19.6C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.95A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75,15.02 15.5,12 9.75,8.98" fill="currentColor" stroke="none"/></svg>' +
      (lang==='ru'?'Добавить YouTube':'Add from YouTube') + '</button></div>';

    // Upload audio
    html += '<div style="padding:0 16px 16px">' +
      '<div style="background:var(--card);border:1.5px dashed var(--border2);border-radius:var(--r);padding:18px;text-align:center;cursor:pointer"' +
      ' onclick="document.getElementById(\'mp-file-in\').click()"' +
      ' ondragover="event.preventDefault();this.style.borderColor=\'var(--amber)\'"' +
      ' ondragleave="this.style.borderColor=\'\'"' +
      ' ondrop="event.preventDefault();this.style.borderColor=\'\';PageMusic._dropAudio(event)">' +
      '<div style="font-size:1.8rem;margin-bottom:6px;opacity:.35">🎵</div>' +
      '<div style="font-size:.85rem;font-weight:500;color:var(--text2)">' + (lang==='ru'?'Загрузить аудио':'Upload audio') + '</div>' +
      '<div style="font-size:.68rem;color:var(--muted);margin-top:3px">MP3, WAV, OGG, M4A</div>' +
      '<div style="font-size:.6rem;color:var(--dim);margin-top:2px">⚠️ ' + (lang==='ru'?'Только свои аудиофайлы или без авторских прав':'Only your own audio or copyright-free files') + '</div>' +
      '</div>' +
      '<input type="file" id="mp-file-in" accept="audio/*" multiple style="display:none" onchange="PageMusic._fileInput(event)">' +
    '</div>';

    c.innerHTML = html;
  }

  function _goto(idx) {
    _idx = idx;
    const lang = State.get('profile')?.lang || 'en';
    const c = document.getElementById('page-music');
    if (c) _render(c, lang);
  }

  function _play() {
    const t = _playlist[_idx]; if (!t) return;
    const iframe = document.getElementById('yt-iframe');
    if (t.yt && iframe) iframe.src = 'https://www.youtube.com/embed/' + t.yt + '?autoplay=1&rel=0&modestbranding=1';
    const audio = document.getElementById('audio-el');
    if (!t.yt && audio) audio.play().catch(()=>{});
    // Show in topbar
    if (typeof MusicPlayer !== 'undefined') MusicPlayer._setTrack(t);
  }

  function _next() { if (!_playlist.length) return; _goto((_idx+1) % _playlist.length); }
  function _prev() { if (!_playlist.length) return; _goto((_idx-1+_playlist.length) % _playlist.length); }

  async function _remove(idx) {
    const t = _playlist[idx];
    if (t?.id) { try { await DB.remove('music', {id:t.id}); } catch {} }
    _playlist.splice(idx, 1);
    LocalCache.set('music', _playlist);
    if (_idx >= _playlist.length) _idx = Math.max(0, _playlist.length-1);
    const lang = State.get('profile')?.lang || 'en';
    const c = document.getElementById('page-music');
    if (c) _render(c, lang);
    if (window.toast) toast('🗑 Removed');
  }

  function _showYtModal() {
    const lang = State.get('profile')?.lang || 'en';
    Modal.show({
      title: lang==='ru'?'🎵 Добавить YouTube':'🎵 Add from YouTube',
      content: '<div class="form-group"><label class="input-label">YouTube link</label>' +
        '<input class="input-field" id="yt-url-in" placeholder="https://youtube.com/watch?v=..." autocomplete="off">' +
        '<div style="font-size:.68rem;color:var(--muted);margin-top:5px">youtube.com/watch?v=... · youtu.be/... · shorts/...</div></div>' +
        '<div class="form-group"><label class="input-label">' + (lang==='ru'?'Название (необязательно)':'Name (optional)') + '</label>' +
        '<input class="input-field" id="yt-name-in" placeholder="' + (lang==='ru'?'Наша песня':'Our song') + '"></div>',
      footer: '<button class="btn btn-primary btn-full" onclick="PageMusic._addYt()">' + (lang==='ru'?'Добавить':'Add to playlist') + '</button>'
    });
  }

  async function _addYt() {
    const url  = Utils.el('yt-url-in')?.value?.trim();
    const name = Utils.el('yt-name-in')?.value?.trim() || 'Song';
    if (!url) { if (window.toast) toast('⚠️ Paste a YouTube link'); return; }
    const match = url.match(/(?:v=|youtu\.be\/|embed\/|shorts\/)([a-zA-Z0-9_-]{11})/);
    if (!match) { if (window.toast) toast('⚠️ Invalid YouTube link'); return; }
    const vid = match[1];
    const coupleId = AppAuth.currentCoupleId();
    Modal.close();
    try {
      const row = coupleId
        ? await DB.insert('music', {couple_id:coupleId, title:name, artist:'YouTube', url:'yt:'+vid})
        : {id:null, title:name, artist:'YouTube', url:'yt:'+vid};
      _playlist.push({id:row.id, title:name, artist:'YouTube', note:'🎵', yt:vid});
      LocalCache.set('music', _playlist);
      if (window.toast) toast('✅ ' + name + ' added');
    } catch {
      _playlist.push({id:null, title:name, artist:'YouTube', note:'🎵', yt:vid});
      if (window.toast) toast('✅ ' + name + ' added (local)');
    }
    const lang = State.get('profile')?.lang || 'en';
    const c = document.getElementById('page-music');
    if (c) _render(c, lang);
  }

  function _dropAudio(e) {
    const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('audio/'));
    if (!files.length) { if (window.toast) toast('⚠️ Audio files only'); return; }
    files.forEach(_addAudioFile);
  }

  function _fileInput(e) { Array.from(e.target.files).forEach(_addAudioFile); e.target.value=''; }

  async function _addAudioFile(file) {
    const title = file.name.replace(/\.[^.]+$/,'').replace(/[-_]/g,' ').trim() || 'Audio';
    const coupleId = AppAuth.currentCoupleId();
    let url = URL.createObjectURL(file);
    let dbId = null;
    if (coupleId) {
      try {
        const path = coupleId+'/'+Date.now()+'-'+file.name;
        url = await DB.uploadFile('music', path, file);
        const row = await DB.insert('music', {couple_id:coupleId, title, artist:'Audio', url});
        dbId = row.id;
      } catch {}
    }
    _playlist.push({id:dbId, title, artist:'Audio', note:'🎵', url});
    LocalCache.set('music', _playlist);
    if (window.toast) toast('✅ "'+title+'" added');
    const lang = State.get('profile')?.lang || 'en';
    const c = document.getElementById('page-music');
    if (c) _render(c, lang);
  }

  return { init, _goto, _play, _next, _prev, _remove, _showYtModal, _addYt, _dropAudio, _fileInput };
})();

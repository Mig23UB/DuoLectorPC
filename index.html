          '<div id="sz-dot" style="width:' + Math.min(_size,18) + 'px;height:' + Math.min(_size,18) + 'px;background:' + _color + ';border-radius:50%;transition:all .15s;flex-shrink:0;min-width:3px;min-height:3px"></div>' +
        '</div>' +
        '<div style="width:1px;height:24px;background:var(--border);flex-shrink:0;margin:0 2px"></div>' +
        // Actions
        '<div style="display:flex;gap:3px;flex-shrink:0;margin-left:auto">' +
          _actionBtn('↩','PageDraw._undo()','Undo') +
          _actionBtn('↪','PageDraw._redo()','Redo') +
          _actionBtn('⌂','PageDraw._resetView()','Reset view') +
          _actionBtn('🗑','PageDraw._clear()','Clear') +
          _actionBtn('↓','PageDraw._savePng()','Save PNG') +
        '</div>' +
      '</div>' +
      // Canvas container
      '<div id="draw-cnt" style="flex:1;overflow:hidden;position:relative;cursor:crosshair;touch-action:none">' +
        '<canvas id="draw-cv" style="position:absolute;top:0;left:0"></canvas>' +
      '</div>' +
      // Status bar
      '<div style="display:flex;align-items:center;justify-content:space-between;padding:3px 10px;background:var(--glass2);border-top:1px solid var(--border);flex-shrink:0;font-size:.6rem;color:var(--dim)">' +
        '<span id="draw-partner-info"></span>' +
        '<span id="draw-zoom-lbl">100% · Pinch or scroll to zoom</span>' +
      '</div>';

    _cnt = document.getElementById('draw-cnt');
    _cv  = document.getElementById('draw-cv');
    _ctx = _cv.getContext('2d');

    // Virtual canvas
    _vc   = document.createElement('canvas');
    _vc.width = _vc.height = VSIZE;
    _vctx = _vc.getContext('2d');
    _vctx.fillStyle = 'rgba(0,0,0,0)';
    _vctx.clearRect(0, 0, VSIZE, VSIZE);

    // Start viewport centered
    _vpx = -(VSIZE/2 - _cnt.clientWidth/2);
    _vpy = -(VSIZE/2 - _cnt.clientHeight/2);

    _resizeCanvas();
    new ResizeObserver(_resizeCanvas).observe(_cnt);

    // Events — mouse
    _cv.addEventListener('mousedown',  _md);
    _cv.addEventListener('mousemove',  _mm);
    window.addEventListener('mouseup', _mu);
    _cv.addEventListener('wheel',      _mw, {passive:false});

    // Events — touch
    _cv.addEventListener('touchstart', _ts, {passive:false});
    _cv.addEventListener('touchmove',  _tm, {passive:false});
    _cv.addEventListener('touchend',   _te, {passive:false});
    _cv.addEventListener('touchcancel',_te, {passive:false});

    _loadSaved();
    _initRealtime();
  }

  function _toolBtn(id, icon, title) {
    return '<button id="tb-' + id + '" onclick="PageDraw._pickTool(\'' + id + '\')" title="' + title + '" style="width:30px;height:30px;border-radius:7px;border:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;background:' + (id===_tool?'var(--amber)':'var(--surface2)') + ';color:' + (id===_tool?'#000':'var(--text2)') + ';transition:all .15s">' + icon + '</button>';
  }
  function _actionBtn(icon, fn, title) {
    return '<button onclick="' + fn + '" title="' + title + '" style="width:28px;height:28px;border-radius:7px;border:none;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;background:var(--surface2);color:var(--text2)">' + icon + '</button>';
  }

  // ── Resize ─────────────────────────────────────────────────────────────────
  function _resizeCanvas() {
    if (!_cnt || !_cv) return;
    const w = _cnt.clientWidth, h = _cnt.clientHeight;
    if (w < 1 || h < 1) return;
    _cv.width  = w;
    _cv.height = h;
    _redraw();
  }

  // ── Redraw virtual canvas to screen ────────────────────────────────────────
  function _redraw() {
    if (!_ctx || !_cv) return;
    _ctx.clearRect(0, 0, _cv.width, _cv.height);
    _ctx.save();
    _ctx.translate(_vpx, _vpy);
    _ctx.scale(_zoom, _zoom);
    _ctx.drawImage(_vc, 0, 0);
    _ctx.restore();
    // Update zoom label
    const lbl = document.getElementById('draw-zoom-lbl');
    if (lbl) lbl.textContent = Math.round(_zoom*100) + '% · Pinch or scroll to zoom';
  }

  // ── Coordinate: screen → virtual canvas ────────────────────────────────────
  function _s2v(sx, sy) {
    return { x: (sx - _vpx) / _zoom, y: (sy - _vpy) / _zoom };
  }

  // ── Apply drawing style to virtual context ─────────────────────────────────
  function _applyStyle(ctx) {
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.globalCompositeOperation = _tool === 'eraser' ? 'destination-out' : 'source-over';
    ctx.globalAlpha  = _tool === 'marker' ? 0.4 : 1;
    ctx.strokeStyle  = _color;
    ctx.lineWidth    = _size;
  }

  // ── Mouse ──────────────────────────────────────────────────────────────────
  function _md(e) {
    if (_tool === 'pan') {
      _panning = true; _panStartX = e.clientX; _panStartY = e.clientY;
      _panVpx = _vpx; _panVpy = _vpy;
      _cv.style.cursor = 'grabbing'; return;
    }
    const r  = _cv.getBoundingClientRect();
    const pt = _s2v(e.clientX - r.left, e.clientY - r.top);
    _drawing = true; _lastX = pt.x; _lastY = pt.y;
    _applyStyle(_vctx);
    _vctx.beginPath(); _vctx.moveTo(pt.x, pt.y);
    _broadcastPt('start', pt.x, pt.y);
  }
  function _mm(e) {
    const r = _cv.getBoundingClientRect();
    if (_panning) {
      _vpx = _panVpx + (e.clientX - _panStartX);
      _vpy = _panVpy + (e.clientY - _panStartY);
      _redraw(); return;
    }
    if (!_drawing) return;
    const pt = _s2v(e.clientX - r.left, e.clientY - r.top);
    _vctx.lineTo(pt.x, pt.y); _vctx.stroke();
    _lastX = pt.x; _lastY = pt.y;
    _redraw(); _schedSave();
    _broadcastPt('move', pt.x, pt.y);
  }
  function _mu() {
    if (_panning) { _panning = false; _cv.style.cursor = _tool==='pan'?'grab':'crosshair'; return; }
    if (_drawing) { _drawing = false; _saveHistory(); _broadcastPt('end',0,0); }
  }
  function _mw(e) {
    e.preventDefault();
    const r   = _cv.getBoundingClientRect();
    const mx  = e.clientX - r.left, my = e.clientY - r.top;
    const fac = e.deltaY < 0 ? 1.12 : 0.89;
    _zoomAt(mx, my, fac);
  }

  // ── Touch ──────────────────────────────────────────────────────────────────
  function _ts(e) {
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t => { _touches[t.identifier] = t; });
    const ids = Object.keys(_touches);

    if (ids.length === 2) {
      // Pinch
      _drawing = false;
      const t1 = _touches[ids[0]], t2 = _touches[ids[1]];
      _lastPinchDist = _dist(t1, t2);
      _lastMidX = (t1.clientX + t2.clientX) / 2;
      _lastMidY = (t1.clientY + t2.clientY) / 2;
      return;
    }
    if (ids.length === 1 && _tool !== 'pan') {
      const t = _touches[ids[0]];
      const r = _cv.getBoundingClientRect();
      const pt = _s2v(t.clientX - r.left, t.clientY - r.top);
      _drawing = true; _lastX = pt.x; _lastY = pt.y;
      _applyStyle(_vctx);
      _vctx.beginPath(); _vctx.moveTo(pt.x, pt.y);
      _broadcastPt('start', pt.x, pt.y);
    }
    if (ids.length === 1 && _tool === 'pan') {
      _panning = true;
      _panStartX = _touches[ids[0]].clientX; _panStartY = _touches[ids[0]].clientY;
      _panVpx = _vpx; _panVpy = _vpy;
    }
  }
  function _tm(e) {
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t => { _touches[t.identifier] = t; });
    const ids = Object.keys(_touches);

    if (ids.length === 2) {
      const t1 = _touches[ids[0]], t2 = _touches[ids[1]];
      const d   = _dist(t1, t2);
      const mx  = (t1.clientX + t2.clientX) / 2;
      const my  = (t1.clientY + t2.clientY) / 2;
      const r   = _cv.getBoundingClientRect();
      // Pinch zoom
      if (_lastPinchDist) {
        const fac = d / _lastPinchDist;
        _zoomAt(mx - r.left, my - r.top, fac);
        // Also pan with mid point movement
        _vpx += (mx - _lastMidX); _vpy += (my - _lastMidY);
        _redraw();
      }
      _lastPinchDist = d; _lastMidX = mx; _lastMidY = my;
      return;
    }
    if (_panning && ids.length === 1) {
      const t = _touches[ids[0]];
      _vpx = _panVpx + (t.clientX - _panStartX);
      _vpy = _panVpy + (t.clientY - _panStartY);
      _redraw(); return;
    }
    if (_drawing && ids.length === 1) {
      const t  = _touches[ids[0]];
      const r  = _cv.getBoundingClientRect();
      const pt = _s2v(t.clientX - r.left, t.clientY - r.top);
      _vctx.lineTo(pt.x, pt.y); _vctx.stroke();
      _lastX = pt.x; _lastY = pt.y;
      _redraw(); _schedSave();
      _broadcastPt('move', pt.x, pt.y);
    }
  }
  function _te(e) {
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t => { delete _touches[t.identifier]; });
    const ids = Object.keys(_touches);
    if (ids.length < 2) { _lastPinchDist = null; }
    if (ids.length === 0) {
      _panning = false;
      if (_drawing) { _drawing = false; _saveHistory(); _broadcastPt('end',0,0); }
    }
  }

  function _dist(t1, t2) { return Math.hypot(t1.clientX-t2.clientX, t1.clientY-t2.clientY); }

  // ── Zoom ───────────────────────────────────────────────────────────────────
  function _zoomAt(cx, cy, fac) {
    const nz = Math.max(0.1, Math.min(8, _zoom * fac));
    const f  = nz / _zoom;
    _vpx = cx - f * (cx - _vpx);
    _vpy = cy - f * (cy - _vpy);
    _zoom = nz;
    _redraw();
  }
  function _resetView() {
    _zoom = 1;
    _vpx = -(_cnt ? VSIZE/2 - _cnt.clientWidth/2 : 0);
    _vpy = -(_cnt ? VSIZE/2 - _cnt.clientHeight/2 : 0);
    _redraw();
  }

  // ── Controls ───────────────────────────────────────────────────────────────
  function _pickTool(t) {
    _tool = t;
    ['pen','marker','eraser','pan'].forEach(n => {
      const b = document.getElementById('tb-' + n);
      if (!b) return;
      b.style.background = n===t ? 'var(--amber)' : 'var(--surface2)';
      b.style.color      = n===t ? '#000' : 'var(--text2)';
    });
    if (_cnt) _cnt.style.cursor = t==='pan' ? 'grab' : 'crosshair';
  }
  function _pickColor(c, el) {
    _color = c;
    document.querySelectorAll('.draw-color-btn').forEach(b => { b.style.border = '2px solid transparent'; });
    if (el) el.style.border = '2px solid var(--text)';
    const dot = document.getElementById('sz-dot');
    if (dot) dot.style.background = c;
    if (_tool === 'eraser') _pickTool('pen');
  }
  function _pickSize(v) {
    _size = v;
    const dot = document.getElementById('sz-dot');
    const s   = Math.min(v, 18);
    if (dot) { dot.style.width = s+'px'; dot.style.height = s+'px'; }
  }

  // ── History ────────────────────────────────────────────────────────────────
  let _hist = [], _hp = -1;
  function _saveHistory() {
    _hist = _hist.slice(0, _hp+1);
    _hist.push(_vc.toDataURL());
    if (_hist.length > 25) _hist.shift();
    _hp = _hist.length - 1;
  }
  function _restoreHistory(idx) {
    if (idx < 0 || idx >= _hist.length) return;
    const img = new Image();
    img.onload = () => { _vctx.clearRect(0,0,VSIZE,VSIZE); _vctx.drawImage(img,0,0); _redraw(); };
    img.src = _hist[idx];
  }
  function _undo() { if (_hp>0) { _hp--; _restoreHistory(_hp); _schedSave(); } }
  function _redo() { if (_hp<_hist.length-1) { _hp++; _restoreHistory(_hp); _schedSave(); } }
  function _clear() {
    _vctx.clearRect(0,0,VSIZE,VSIZE);
    _saveHistory(); _redraw(); _schedSave();
  }
  function _savePng() {
    const a = document.createElement('a');
    a.href = _vc.toDataURL('image/png');
    a.download = 'duolector-drawing.png';
    a.click();
  }

  // ── Persist ────────────────────────────────────────────────────────────────
  function _schedSave() { clearTimeout(_saveTimer); _saveTimer = setTimeout(_autoSave, 2000); }
  async function _autoSave() {
    const coupleId = AppAuth.currentCoupleId(); if (!coupleId) return;
    try { await DB.setSetting(coupleId, 'drawing', _vc.toDataURL('image/jpeg', 0.65)); } catch {}
    if (typeof KM !== 'undefined') KM.addDrawing && KM.addDrawing();
  }
  async function _loadSaved() {
    const coupleId = AppAuth.currentCoupleId(); if (!coupleId) return;
    try {
      const d = await DB.getSetting(coupleId, 'drawing');
      if (!d || !d.startsWith('data:')) { _saveHistory(); return; }
      const img = new Image();
      img.onload = () => { _vctx.clearRect(0,0,VSIZE,VSIZE); _vctx.drawImage(img,0,0); _saveHistory(); _redraw(); };
      img.src = d;
    } catch { _saveHistory(); }
  }

  // ── Realtime collaboration ─────────────────────────────────────────────────
  function _broadcastPt(type, x, y) {
    if (!_channel) return;
    try {
      _channel.send({type:'broadcast', event:'draw', payload:{
        type, x, y, tool:_tool, color:_color, size:_size,
        by: State.get('profile')?.id
      }});
    } catch {}
  }
  function _initRealtime() {
    const coupleId = AppAuth.currentCoupleId(); if (!coupleId) return;
    try {
      _channel = DB.client().channel('draw-' + coupleId);
      _channel.on('broadcast', {event:'draw'}, ({payload:p}) => {
        if (!p || p.by === State.get('profile')?.id) return;
        const prev = { op:_vctx.globalCompositeOperation, alpha:_vctx.globalAlpha, color:_vctx.strokeStyle, w:_vctx.lineWidth };
        _vctx.lineCap = 'round'; _vctx.lineJoin = 'round';
        _vctx.globalCompositeOperation = p.tool==='eraser' ? 'destination-out' : 'source-over';
        _vctx.globalAlpha = p.tool==='marker' ? 0.4 : 1;
        _vctx.strokeStyle = p.color; _vctx.lineWidth = p.size;
        if (p.type==='start') { _vctx.beginPath(); _vctx.moveTo(p.x, p.y); }
        else if (p.type==='move') { _vctx.lineTo(p.x, p.y); _vctx.stroke(); _redraw(); }
        else if (p.type==='end') { _schedSave(); }
        _vctx.globalCompositeOperation = prev.op; _vctx.globalAlpha = prev.alpha;
        _vctx.strokeStyle = prev.color; _vctx.lineWidth = prev.w;
        // Show partner drawing indicator
        const partner = State.get('partner');
        const el = document.getElementById('draw-partner-info');
        if (el && partner) {
          el.textContent = (partner.emoji||'✏️') + ' ' + partner.display_name + ' is drawing…';
          clearTimeout(el._t); el._t = setTimeout(()=>{ el.textContent=''; }, 2000);
        }
      });
      _channel.subscribe();
    } catch {}
  }

  return { init, _pickTool, _pickColor, _pickSize, _undo, _redo, _clear, _savePng, _resetView };
})();


// ── TRANSLATE PAGE — Multi-language ──────────────────────────────────────────
const PageTranslate = (() => {
  const LANGS = [
    { code:'es', label:'Español',    flag:'🇪🇸' },
    { code:'ru', label:'Русский',    flag:'🇷🇺' },
    { code:'en', label:'English',    flag:'🇬🇧' },
    { code:'pt', label:'Português',  flag:'🇧🇷' },
    { code:'fr', label:'Français',   flag:'🇫🇷' },
    { code:'de', label:'Deutsch',    flag:'🇩🇪' },
    { code:'it', label:'Italiano',   flag:'🇮🇹' },
    { code:'zh', label:'中文',        flag:'🇨🇳' },
    { code:'ja', label:'日本語',      flag:'🇯🇵' },
    { code:'ko', label:'한국어',       flag:'🇰🇷' },
    { code:'ar', label:'العربية',    flag:'🇸🇦' },
    { code:'hi', label:'हिन्दी',      flag:'🇮🇳' },
    { code:'tr', label:'Türkçe',     flag:'🇹🇷' },
    { code:'pl', label:'Polski',     flag:'🇵🇱' },
    { code:'uk', label:'Українська', flag:'🇺🇦' },
    { code:'nl', label:'Nederlands', flag:'🇳🇱' },
  ];

  const PRESETS = [
    { es:'Te extraño muchísimo',        ru:'Я очень скучаю по тебе' },
    { es:'¿Cómo estuvo tu día?',        ru:'Как прошёл твой день?' },
    { es:'Te quiero mucho',             ru:'Я тебя очень люблю' },
    { es:'Buenas noches, mi amor',      ru:'Спокойной ночи, любимый' },
    { es:'¿Cuándo nos vemos?',          ru:'Когда мы увидимся?' },
    { es:'Estoy pensando en ti',        ru:'Я думаю о тебе' },
    { es:'Eres lo mejor que me pasó',   ru:'Ты лучшее, что со мной случилось' },
    { es:'Cuenta regresiva: ¡ya falta poco!', ru:'Обратный отсчёт: уже скоро!' },
  ];

  let _fromCode = 'es', _toCode = 'ru';
  let _loading = false;

  function init(container) {
    _fromCode = State.get('profile')?.lang || 'es';
    _toCode = _fromCode === 'es' ? 'ru' : 'es';
    _render(container);
  }

  function _render(container) {
    const from = LANGS.find(l => l.code === _fromCode) || LANGS[0];
    const to   = LANGS.find(l => l.code === _toCode)   || LANGS[1];

    container.innerHTML = `
      <div class="page-title display">Traductor 🤖</div>
      <div class="page-sub">Comunícate en cualquier idioma</div>

      <div class="card">
        <div class="tl-lang-row">
          <div class="tl-lang-pick" id="tl-from-pick" onclick="PageTranslate._showLangPicker('from')">
            <span style="font-size:1.3rem">${from.flag}</span>
            <span style="font-size:.82rem;font-weight:500">${from.label}</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
          <button class="tl-swap-btn" onclick="PageTranslate._swap()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
          </button>
          <div class="tl-lang-pick" id="tl-to-pick" onclick="PageTranslate._showLangPicker('to')">
            <span style="font-size:1.3rem">${to.flag}</span>
            <span style="font-size:.82rem;font-weight:500">${to.label}</span>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>

        <textarea id="tl-input" class="tl-textarea" placeholder="Escribe o habla aquí..."
          oninput="PageTranslate._onInput()">${''}</textarea>

        <div style="display:flex;gap:8px;margin-top:10px">
          <button class="btn btn-primary" style="flex:1" id="tl-btn" onclick="PageTranslate._translate()">
            Traducir
          </button>
          <button class="btn btn-ghost btn-sm" onclick="PageTranslate._clear()" title="Limpiar">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>
          </button>
        </div>
      </div>

      <div id="tl-result-card" class="card tl-result-card" style="display:none">
        <div style="font-size:.65rem;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.08em">${to.flag} ${to.label}</div>
        <div id="tl-result-text" style="font-size:1.1rem;line-height:1.7;color:var(--text)"></div>
        <div style="display:flex;gap:8px;margin-top:12px">
          <button class="btn btn-ghost btn-sm" onclick="PageTranslate._copy()" style="flex:1">📋 Copiar</button>
          <button class="btn btn-primary btn-sm" onclick="PageTranslate._sendToChat()" style="flex:1">💬 Enviar al chat</button>
        </div>
      </div>

      <div class="section-label">Frases rápidas</div>
      ${PRESETS.map(p => {
        const myText = _fromCode === 'ru' ? p.ru : p.es;
        const theirText = _fromCode === 'ru' ? p.es : p.ru;
        return `<div class="card tl-preset" onclick="PageTranslate._usePreset('${Utils.escHtml(myText).replace(/'/g,"\\'")}','${Utils.escHtml(theirText).replace(/'/g,"\\'")}')">
          <div style="font-size:.9rem;margin-bottom:4px">${myText}</div>
          <div style="font-size:.78rem;color:var(--muted);font-family:'Caveat',cursive">${theirText}</div>
        </div>`;
      }).join('')}
    `;
  }

  let _autoTimer = null;
  function _onInput() {
    clearTimeout(_autoTimer);
    _autoTimer = setTimeout(_translate, 1200);
  }

  async function _translate() {
    const text = document.getElementById('tl-input')?.value?.trim();
    if (!text || _loading) return;
    _loading = true;
    const btn = document.getElementById('tl-btn');
    if (btn) btn.textContent = '⏳ Traduciendo...';

    try {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${_fromCode}|${_toCode}`;
      const resp = await fetch(url);
      const data = await resp.json();
      const result = data?.responseData?.translatedText || '—';
      const card = document.getElementById('tl-result-card');
      const txt  = document.getElementById('tl-result-text');
      if (card) card.style.display = 'block';
      if (txt)  txt.textContent = result;
    } catch {
      if (window.toast) toast('⚠️ Error de traducción');
    }
    _loading = false;
    if (btn) btn.textContent = 'Traducir';
  }

  function _swap() {
    const tmp = _fromCode; _fromCode = _toCode; _toCode = tmp;
    const inp = document.getElementById('tl-input');
    const res = document.getElementById('tl-result-text');
    const newText = res?.textContent || '';
    const c = document.getElementById(`page-translate`);
    if (c) _render(c);
    const newInp = document.getElementById('tl-input');
    if (newInp && newText && newText !== '—') newInp.value = newText;
  }

  function _clear() {
    const inp = document.getElementById('tl-input');
    const card = document.getElementById('tl-result-card');
    if (inp) inp.value = '';
    if (card) card.style.display = 'none';
  }

  function _copy() {
    const txt = document.getElementById('tl-result-text')?.textContent;
    if (txt) navigator.clipboard?.writeText(txt).then(() => { if (window.toast) toast('📋 Copiado'); });
  }

  async function _sendToChat() {
    const txt = document.getElementById('tl-result-text')?.textContent;
    if (!txt) return;
    const user = State.get('profile');
    const coupleId = AppAuth.currentCoupleId();
    if (!user || !coupleId) { if (window.toast) toast('⚠️ Sin sesión'); return; }
    try {
      await DB.insert('messages', {
        couple_id: coupleId,
        user_id: user.id,
        user_name: user.display_name,
        user_emoji: user.emoji,
        content: txt,
      });
      if (window.toast) toast('💬 ¡Enviado al chat!');
      Router.go('chat');
    } catch { if (window.toast) toast('⚠️ Error'); }
  }

  function _usePreset(mine, theirs) {
    const inp = document.getElementById('tl-input');
    if (inp) inp.value = mine;
    const card = document.getElementById('tl-result-card');
    const txt  = document.getElementById('tl-result-text');
    if (card) card.style.display = 'block';
    if (txt)  txt.textContent = theirs;
  }

  function _showLangPicker(dir) {
    const current = dir === 'from' ? _fromCode : _toCode;
    Modal.show({
      title: dir === 'from' ? 'Idioma de origen' : 'Traducir a',
      content: `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        ${LANGS.map(l => `
          <div class="lang-opt${l.code===current?' active':''}" onclick="PageTranslate._pickLang('${dir}','${l.code}')">
            <span style="font-size:1.3rem">${l.flag}</span>
            <span style="font-size:.82rem">${l.label}</span>
          </div>`).join('')}
      </div>`
    });
  }

  function _pickLang(dir, code) {
    if (dir === 'from') _fromCode = code;
    else _toCode = code;
    Modal.close();
    const c = document.getElementById(`page-translate`);
    if (c) _render(c);
  }

  return { init, _translate, _swap, _clear, _copy, _sendToChat, _usePreset, _showLangPicker, _pickLang, _onInput };
})();


// ── STATS PAGE ────────────────────────────────────────────────────────────────
const PageStats = (() => {

  async function init(container) {
    var lang = State.get('profile') ? State.get('profile').lang || 'es' : 'es';
    container.innerHTML =
      '<div class="page-title display">' + (lang==='ru'?'Статистика 📊':'Estadísticas 📊') + '</div>' +
      '<div style="padding:30px;text-align:center"><div class="spinner"></div></div>';

    var coupleId = AppAuth.currentCoupleId();
    if (!coupleId) { _render(container, {}, lang); return; }

    try {
      var results = await Promise.all([
        DB.get('messages', { eq: [['couple_id', coupleId]], select: 'id,user_id,created_at' }),
        DB.get('diary',    { eq: [['couple_id', coupleId]], select: 'id,user_id' }),
        DB.get('books',    { eq: [['couple_id', coupleId]], select: 'id,progress_pct,title,author' }),
        DB.get('couples',  { eqOne: ['id', coupleId] }),
      ]);

      var msgs    = results[0];
      var diary   = results[1];
      var books   = results[2];
      var couples = results[3];
      var coupleData = couples[0] || {};
      var myId = State.get('profile') ? State.get('profile').id : null;

      var daysTogether = coupleData.met_date
        ? Math.max(0, Math.floor((new Date() - new Date(coupleData.met_date)) / 86400000))
        : null;
      var daysUntil = coupleData.meeting_date
        ? Math.max(0, Math.floor((new Date(coupleData.meeting_date) - new Date()) / 86400000))
        : null;

      _render(container, {
        daysTogether: daysTogether,
        daysUntil: daysUntil,
        totalMsgs:  msgs.length,
        myMsgs:     myId ? msgs.filter(function(m) { return m.user_id === myId; }).length : 0,
        totalDiary: diary.length,
        myDiary:    myId ? diary.filter(function(d) { return d.user_id === myId; }).length : 0,
        totalBooks: books.length,
        booksRead:  books.filter(function(b) { return b.progress_pct >= 100; }).length,
        streak:     KM ? KM.streak : 0,
        km:         KM ? KM._total : 0,
        books:      books,
      }, lang);

      console.error('stats', e);
      container.innerHTML =
        '<div class="page-title display">' + (lang==='ru'?'Статистика 📊':'Estadísticas 📊') + '</div>' +
        '<div style="padding:20px;color:var(--rose);font-size:.85rem">⚠️ ' + e.message + '</div>';
    }
  }

  function _render(container, d, lang) {
    var lv = KM ? KM.level() : { ico:'🌱', name:'Despegando', next:1 };
    var km = KM ? KM._total : 0;
    var pct = lv.next ? Math.min(100, km / lv.next * 100) : 100;

    var html =
      '<div class="page-title display">' + (lang==='ru'?'Статистика 📊':'Estadísticas 📊') + '</div>' +
      '<div class="page-sub">' + (lang==='ru'?'Ваше путешествие в цифрах':'Nuestro viaje en números') + '</div>';

    // KM card
    html +=
      '<div class="card" style="background:linear-gradient(135deg,rgba(126,200,227,.1),rgba(167,139,250,.08));border-color:rgba(126,200,227,.2);text-align:center;padding:20px">' +
        '<div style="font-size:2.5rem;margin-bottom:6px">' + lv.ico + '</div>' +
        '<div class="display" style="font-size:1.8rem;font-weight:300;color:var(--ice)">' + (KM ? KM.fmt() : '0km') + '</div>' +
        '<div style="font-size:.78rem;color:var(--muted);margin-bottom:10px">' + lv.name + '</div>' +
        (lv.next ?
          '<div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden">' +
            '<div style="height:100%;width:' + pct + '%;background:linear-gradient(90deg,var(--ice),var(--lav));border-radius:3px"></div>' +
          '</div>' +
          '<div style="font-size:.65rem;color:var(--muted);margin-top:4px">' + km.toFixed(1) + ' / ' + lv.next + ' km</div>'
        : '') +
      '</div>';

    // Stats grid
    html += '<div class="stats-grid">';
    var items = [
      [d.daysTogether !== null && d.daysTogether !== undefined ? d.daysTogether : '—', lang==='ru'?'дней вместе':'días juntos', 'var(--amber)'],
      [d.streak !== undefined ? d.streak : '—', lang==='ru'?'серия 🔥':'racha 🔥', 'var(--rose)'],
      [d.totalMsgs !== undefined ? d.totalMsgs : '—', lang==='ru'?'сообщений':'mensajes', 'var(--ice)'],
      [d.totalDiary !== undefined ? d.totalDiary : '—', lang==='ru'?'дневник':'diario', 'var(--mint)'],
      [d.totalBooks !== undefined ? d.totalBooks : '—', lang==='ru'?'книги 📚':'libros 📚', 'var(--lav)'],
      [d.daysUntil !== null && d.daysUntil !== undefined ? d.daysUntil : '—', lang==='ru'?'дней до встречи ✈️':'días para vernos ✈️', 'var(--amber)'],
    ];
    items.forEach(function(item) {
      html +=
        '<div class="stat-card">' +
          '<div class="stat-num display" style="color:' + item[2] + '">' + item[0] + '</div>' +
          '<div class="stat-label">' + item[1] + '</div>' +
        '</div>';
    });
    html += '</div>';

    // Books progress
    if (d.books && d.books.length > 0) {
      html += '<div class="section-label">' + (lang==='ru'?'Прогресс чтения':'Progreso de lectura') + '</div>';
      d.books.forEach(function(b) {
        html +=
          '<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer" onclick="Router.go(\'reader\')">' +
            '<div style="font-size:1.4rem;width:42px;height:42px;background:var(--surface2);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0">📖</div>' +
            '<div style="flex:1;min-width:0">' +
              '<div style="font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + Utils.escHtml(b.title||'') + '</div>' +
              '<div style="height:5px;background:var(--surface2);border-radius:3px;margin-top:6px;overflow:hidden">' +
                '<div style="height:100%;width:' + (b.progress_pct||0) + '%;background:linear-gradient(90deg,var(--amber),var(--rose));border-radius:3px"></div>' +
              '</div>' +
              '<div style="font-size:.62rem;color:var(--muted);margin-top:3px">' + (b.progress_pct||0) + '%</div>' +
            '</div>' +
          '</div>';
      });
    }

    // If no dates set, prompt
    if (d.daysTogether === null || d.daysTogether === undefined) {
      html +=
        '<div class="card" style="text-align:center;cursor:pointer;border-style:dashed" onclick="Router.go(\'config\')">' +
          '<div style="font-size:.88rem;color:var(--amber)">⚙️ ' + (lang==='ru'?'Настрой даты в Настройках →':'Configurá las fechas en Ajustes →') + '</div>' +
        '</div>';
    }

    container.innerHTML = html;
  }

  return { init };
})();


// ── CHALLENGES PAGE ───────────────────────────────────────────────────────────
const PageChallenges = (() => {

  const CHALLENGES = [
    { key:'read_7_days',  ico:'📖', xp:50,  target:7,  es:'Lector dedicado',    ru:'Преданный читатель',   des_es:'Lee 7 días seguidos',              des_ru:'Читай 7 дней подряд' },
    { key:'msgs_50',      ico:'💬', xp:30,  target:50, es:'Conversadores',      ru:'Собеседники',          des_es:'50 mensajes este mes',             des_ru:'50 сообщений в этом месяце' },
    { key:'diary_5',      ico:'📔', xp:40,  target:5,  es:'Cronistas',          ru:'Летописцы',            des_es:'5 entradas de diario',             des_ru:'5 записей в дневник' },
    { key:'draw_3',       ico:'🎨', xp:25,  target:3,  es:'Artistas',           ru:'Художники',            des_es:'Dibujen juntos 3 veces',           des_ru:'Рисуйте вместе 3 раза' },
    { key:'translate_20', ico:'🌍', xp:20,  target:20, es:'Políglota',          ru:'Полиглот',             des_es:'Usen el traductor 20 veces',       des_ru:'Используйте переводчик 20 раз' },
    { key:'book_finish',  ico:'📚', xp:100, target:1,  es:'Terminar un libro',  ru:'Дочитать книгу',       des_es:'Terminen un libro juntos',         des_ru:'Дочитайте книгу вместе' },
    { key:'streak_30',    ico:'🔥', xp:150, target:30, es:'Racha épica',        ru:'Эпическая серия',      des_es:'30 días de racha',                 des_ru:'30 дней подряд' },
    { key:'online_20',    ico:'⭐', xp:60,  target:20, es:'Siempre conectados', ru:'Всегда на связи',      des_es:'Entren 20 días este mes',          des_ru:'Входите 20 дней в этом месяце' },
  ];

  async function init(container) {
    const lang = State.get('profile')?.lang || 'es';
    container.innerHTML = '<div class="page-title display">Challenges 🔥</div>' +
      '<div style="padding:0 16px;display:flex;flex-direction:column;gap:10px;margin-top:16px">' +
      Array(4).fill('<div style="height:90px;background:var(--surface2);border-radius:var(--r);animation:pulse 1.5s infinite"></div>').join('') +
      '</div>';

    const coupleId = AppAuth.currentCoupleId();
    const month = new Date().toISOString().slice(0,7);
    const progress = {};

    if (coupleId) {
      try {
        const rows = await DB.get('challenges', { eq: [['couple_id', coupleId], ['month', month]] });
        rows.forEach(function(r) { progress[r.key] = r; });

        const monthStart = new Date(month + '-01');
        const msgs  = await DB.get('messages', { eq: [['couple_id', coupleId]], select: 'id,created_at' });
        const diary = await DB.get('diary',    { eq: [['couple_id', coupleId]], select: 'id,created_at' });
        const books = await DB.get('books',    { eq: [['couple_id', coupleId]], select: 'id,progress_pct' });

        const msgsMonth  = msgs.filter(function(m)  { return new Date(m.created_at) >= monthStart; }).length;
        const diaryMonth = diary.filter(function(d) { return new Date(d.created_at) >= monthStart; }).length;
        const booksDone  = books.filter(function(b) { return b.progress_pct >= 100; }).length;
        const streak     = KM ? KM.streak : 0;

        progress['msgs_50']     = { progress: msgsMonth,          completed: msgsMonth  >= 50 };
        progress['diary_5']     = { progress: diaryMonth,         completed: diaryMonth >= 5  };
        progress['book_finish'] = { progress: booksDone,          completed: booksDone  >= 1  };
        progress['streak_30']   = { progress: streak,             completed: streak     >= 30 };
        progress['read_7_days'] = { progress: Math.min(streak,7), completed: streak     >= 7  };
      } catch(e) { console.error('challenges', e); }
    }

    _render(container, progress, lang, month);
  }

  function _card(ch, p, lang) {
    var cur  = Math.min((p && p.progress) || 0, ch.target);
    var pct  = Math.round(cur / ch.target * 100);
    var done = (p && p.completed) || pct >= 100;
    var title      = lang === 'ru' ? ch.ru      : ch.es;
    var desc       = lang === 'ru' ? ch.des_ru  : ch.des_es;
    var doneText   = lang === 'ru' ? 'Выполнено ✓' : 'Completado ✓';
    var cardBorder = done ? 'border-color:rgba(112,200,160,.4);background:rgba(112,200,160,.05)' : '';
    var barBg      = done ? 'var(--mint)' : 'linear-gradient(90deg,var(--amber),var(--rose))';
    var icon       = done ? '✅' : ch.ico;
    var pctLabel   = pct + '%' + (done ? ' · ' + doneText : '');

    return '<div class="card" style="margin-bottom:10px;' + cardBorder + '">' +
      '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">' +
        '<div style="width:42px;height:42px;background:var(--surface2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0">' + icon + '</div>' +
        '<div style="flex:1">' +
          '<div style="font-weight:600;font-size:.88rem">' + title + '</div>' +
          '<div style="font-size:.72rem;color:var(--muted)">' + desc + '</div>' +
        '</div>' +
        '<div style="font-size:.72rem;color:var(--amber);font-weight:700;flex-shrink:0">+' + ch.xp + ' km</div>' +
      '</div>' +
      '<div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:4px">' +
        '<span>' + cur + ' / ' + ch.target + '</span>' +
        '<span>' + pctLabel + '</span>' +
      '</div>' +
      '<div style="height:6px;background:var(--surface2);border-radius:3px;overflow:hidden">' +
        '<div style="height:100%;width:' + pct + '%;background:' + barBg + ';border-radius:3px;transition:width .8s"></div>' +
      '</div>' +
    '</div>';
  }

  function _render(container, progress, lang, month) {
    const lv     = KM ? KM.level() : { ico:'🌱', name:'Despegando' };
    const km     = KM ? KM._total : 0;
    const streak = KM ? KM.streak : 0;
    const d      = new Date();
    const monthName = d.toLocaleDateString(lang==='ru'?'ru':'es', { month:'long', year:'numeric' });
    const cards  = CHALLENGES.map(function(ch) { return _card(ch, progress[ch.key], lang); }).join('');

    container.innerHTML =
      '<div class="page-title display">' + (lang==='ru'?'Задания 🔥':'Retos 🔥') + '</div>' +
      '<div class="page-sub">' + monthName + '</div>' +
      '<div class="card" style="background:linear-gradient(135deg,rgba(232,168,74,.1),rgba(224,120,144,.08));border-color:rgba(232,168,74,.3);display:flex;align-items:center;gap:14px">' +
        '<div style="font-size:2.5rem">' + lv.ico + '</div>' +
        '<div style="flex:1">' +
          '<div style="font-size:1rem;font-weight:600">' + lv.name + '</div>' +
          '<div style="font-size:.75rem;color:var(--muted)">' + km.toFixed(1) + ' km · ' + streak + (lang==='ru'?' дней серии':' días de racha') + '</div>' +
        '</div>' +
        '<div style="text-align:right">' +
          '<div class="display" style="font-size:1.6rem;color:var(--amber)">' + (KM?KM.fmt():'0km') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="section-label">' + (lang==='ru'?('Задания ' + monthName):('Retos de ' + monthName)) + '</div>' +
      cards;
  }

  return { init };
})();

  function _toggleTheme(dark) {
    var theme = dark ? 'dark' : 'light';
    document.body.setAttribute('data-theme', theme);
    State.set('theme', theme);
  }

  async function _setLang(lang) {
    var user = State.get('profile');
    if (!user) return;
    try {
      await DB.upsert('profiles', { id: user.id, lang: lang }, { onConflict: 'id' });
      State.set('profile', Object.assign({}, user, { lang: lang }));
      localStorage.setItem('dl_profile', JSON.stringify(State.get('profile')));
      if (window.toast) toast(lang==='ru'?'🇷🇺 Язык изменён':'🇪🇸 Idioma cambiado');
      var c = document.getElementById('page-config');
      if (c) init(c);
    } catch(e) { if (window.toast) toast('⚠️ ' + e.message); }
  }

  async function _saveProfile() {
    var user   = State.get('profile');
    var couple = State.get('couple');
    if (!user) return;
    var tz   = Utils.el('cfg-tz')?.value   || 'America/Montevideo';
    var city = Utils.el('cfg-city')?.value?.trim() || '';
    var lang = user.lang || 'es';
    try {
      await DB.upsert('profiles', { id: user.id, timezone: tz, city: city }, { onConflict: 'id' });
      if (couple) {
        await DB.client().from('couple_members')
          .update({ timezone: tz, city: city })
          .eq('couple_id', couple.id).eq('user_id', user.id);
        var members = await DB.get('couple_members', { eqOne: ['couple_id', couple.id] });
        State.set('members', members);
      }
      State.set('profile', Object.assign({}, user, { timezone: tz, city: city }));
      localStorage.setItem('dl_profile', JSON.stringify(State.get('profile')));
      if (window.toast) toast(lang==='ru'?'💾 Сохранено':'💾 Perfil guardado');
    } catch(e) { if (window.toast) toast('⚠️ ' + e.message); }
  }

  async function _saveDates() {
    var metDate  = Utils.el('cfg-met')?.value;
    var meetDate = Utils.el('cfg-meet')?.value;
    var coupleId = AppAuth.currentCoupleId();
    var lang     = State.get('profile')?.lang || 'es';
    if (!coupleId) return;
    try {
      var upd = {};
      if (metDate)  upd.met_date      = metDate;
      if (meetDate) upd.meeting_date  = meetDate;
      if (Object.keys(upd).length) {
        await DB.update('couples', { id: coupleId }, upd);
        var couple = State.get('couple');
        State.set('couple', Object.assign({}, couple, upd));
        localStorage.setItem('dl_couple', JSON.stringify(State.get('couple')));
      }
      if (window.toast) toast(lang==='ru'?'💾 Сохранено':'💾 Fechas guardadas');
    } catch(e) { if (window.toast) toast('⚠️ ' + e.message); }
  }

  function _copyCode() {
    var code = State.get('couple')?.invite_code;
    if (code) navigator.clipboard?.writeText(code).then(function() {
      if (window.toast) toast('📋 ' + (State.get('profile')?.lang==='ru'?'Скопировано':'Código copiado'));
    });
  }

  function _copyLink() {
    var couple = State.get('couple');
    if (!couple) return;
    var base = window.DL_CONFIG?.APP_URL || window.location.href.split('?')[0];
    var link = base + '?invite=' + couple.invite_code;
    navigator.clipboard?.writeText(link).then(function() {
      if (window.toast) toast('🔗 ' + (State.get('profile')?.lang==='ru'?'Ссылка скопирована':'Link copiado'));
    });
  }

  async function _signOut() {
    await AppAuth.signOut();
  }

  return { init, _toggleTheme, _setLang, _saveProfile, _saveDates, _copyCode, _copyLink, _signOut };
})();

    this._tab = t;
    this._loading = false;
    Utils.qsa('.auth-tab').forEach(el => el.classList.toggle('active', el.dataset.tab === t));
    this._render();
  },

  _err(msg) {
    const e = Utils.el('auth-err');
    if (e) { e.textContent = msg; e.classList.toggle('show', !!msg); }
  },

  _setLoading(on, label) {
    this._loading = on;
    const btn = Utils.el('auth-submit-btn');
    if (!btn) return;
    btn.disabled = on;
    btn.textContent = on ? 'Un momento...' : label;
    btn.style.opacity = on ? '0.7' : '1';
  },

  async login() {
    if (this._loading) return;
    const email = Utils.el('auth-email')?.value?.trim();
    const pass  = Utils.el('auth-pass')?.value;
    if (!email || !pass) { this._err('Fill in all fields'); return; }
    this._err('');
    this._setLoading(true, 'Sign In');
    try {
      await AppAuth.login(email, pass);
    } catch(e) {
      const msg = (e.message || '').toLowerCase();
      if (msg.includes('invalid') || msg.includes('credentials') || msg.includes('password')) {
        this._err('Wrong email or password');
      } else if (msg.includes('confirmed')) {
        this._err('Email not confirmed — contact support');
      } else {
        this._err(e.message || 'Login failed');
      }
      this._setLoading(false, 'Sign In');
    }
  },

  async register() {
    if (this._loading) return;
    const name  = Utils.el('auth-name')?.value?.trim();
    const email = Utils.el('auth-email')?.value?.trim();
    const pass  = Utils.el('auth-pass')?.value;
    const lang  = Utils.el('auth-lang')?.value || 'en';
    if (!name || !email || !pass) { this._err('Fill in all fields'); return; }
    if (pass.length < 6) { this._err('Password must be at least 6 characters'); return; }
    this._err('');
    this._setLoading(true, 'Create account');
    try {
      await AppAuth.register(email, pass, name, lang);
    } catch(e) {
      this._err(e.message || 'Registration error');
      this._setLoading(false, 'Create account');
    }
  },

  async google() {
    try { await DB.Auth.signInGoogle(); } catch(e) { this._err(e.message); }
  }
};

// ── Helpers ───────────────────────────────────────────────────────────────────
function _show(id) { const e = Utils.el(id); if (e) e.style.display = ''; }
function _hide(id) { const e = Utils.el(id); if (e) e.style.display = 'none'; }

function _initGA(id) {
  const s = document.createElement('script');
  s.src = 'https://www.googletagmanager.com/gtag/js?id=' + id;
  s.async = true;
  document.head.appendChild(s);
  window.dataLayer = window.dataLayer || [];
  window.gtag = function(){ window.dataLayer.push(arguments); };
  window.gtag('js', new Date());
  window.gtag('config', id);
}

function _animateBg(canvasId) {
  const canvas = Utils.el(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const P = Array.from({length:55},()=>({
    x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    vx:(Math.random()-.5)*.4, vy:-(Math.random()*.5+.2),
    size:Math.random()*11+4, opacity:Math.random()*.5+.2,
    char:['✦','✧','⋆','❀','♡','✿'][Math.floor(Math.random()*6)],
    color:['#e8a84a','#e07890','#7ec8e3','#a78bfa'][Math.floor(Math.random()*4)]
  }));
  let raf;
  function draw() {
    if (!Utils.el(canvasId)){cancelAnimationFrame(raf);return;}
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const g = ctx.createLinearGradient(0,0,0,canvas.height);
    g.addColorStop(0,'#0a0a0f'); g.addColorStop(1,'#0e0a1a');
    ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);
    P.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.y<-20){p.y=canvas.height+20;p.x=Math.random()*canvas.width;}
      if(p.x<-20)p.x=canvas.width+20; if(p.x>canvas.width+20)p.x=-20;
      ctx.globalAlpha=p.opacity*(0.5+0.5*Math.sin(Date.now()/1000+p.x));
      ctx.fillStyle=p.color; ctx.font=`${p.size}px serif`; ctx.fillText(p.char,p.x,p.y);
    });
    ctx.globalAlpha=1; raf=requestAnimationFrame(draw);
  }
  draw();
}

// ── KM SYSTEM ─────────────────────────────────────────────────────────────────
const KM = {
  _total: 0,
  today: { presence:0, msgs:0, diary:0, reading:0, drawing:0 },
  CAPS: { presence:1.0, msgs:1.0, diary:1.0, reading:2.0, drawing:0.5 },
  streak: 0,

  async load() {
    const coupleId = AppAuth.currentCoupleId();
    if (!coupleId) return;
    try {
      const raw = await DB.getSetting(coupleId, 'km_data');
      if (raw) {
        const d = JSON.parse(raw);
        this._total = d.total || 0;
        this.streak = d.streak || 0;
        if (d.date === new Date().toDateString()) this.today = d.today || this.today;
      }
    } catch {}
    this.update();
  },

  async save() {
    const coupleId = AppAuth.currentCoupleId();
    if (!coupleId) return;
    try {
      await DB.setSetting(coupleId, 'km_data', JSON.stringify({
        total: this._total, streak: this.streak,
        today: this.today, date: new Date().toDateString()
      }));
    } catch {}
  },

  fmt(v) {
    v = v !== undefined ? v : this._total;
    if (v < 1) return Math.round(v * 1000) + 'm';
    return v.toFixed(1).replace(/\.0$/, '') + 'km';
  },

  level() {
    const t = this._total;
    if (t < 1)    return { ico:'🌱', name:'Despegando',    next:1 };
    if (t < 10)   return { ico:'✈️', name:'En vuelo',      next:10 };
    if (t < 50)   return { ico:'🌊', name:'Cruzando mares',next:50 };
    if (t < 100)  return { ico:'🌍', name:'Exploradores',  next:100 };
    if (t < 500)  return { ico:'⭐', name:'Estrellas',     next:500 };
    if (t < 1000) return { ico:'💫', name:'Infinito',      next:1000 };
    return { ico:'👑', name:'Leyenda', next:null };
  },

  earn(cat, amount) {
    const cap = this.CAPS[cat] || 999;
    const remaining = cap - (this.today[cat] || 0);
    const earned = Math.min(amount, remaining);
    if (earned <= 0) return 0;
    this.today[cat] = (this.today[cat] || 0) + earned;
    this._total += earned;
    this.update();
    this.save();
    return earned;
  },

  earnBonus(amount, label) {
    this._total += amount;
    this.update();
    this.save();
    if (window.toast) toast('🏆 +' + this.fmt(amount) + ' ' + label);
  },

  addMsg(text) {
    if (!text || text.length < 50) return;
    const earned = this.earn('msgs', 0.1);
    if (earned > 0 && window.toast) toast('✈️ +' + this.fmt(earned));
  },

  addDiary() { this.earn('diary', 0.5); },
  addPage()  { this.earn('reading', 0.05); },
  addDraw()  { this.earn('drawing', 0.5); },

  markPresence() {
    const earned = this.earn('presence', 1.0);
    if (earned > 0) {
      this.streak++;
      this.save();
      if (this.streak === 7)  this.earnBonus(3, '¡Racha de 7 días!');
      if (this.streak === 30) this.earnBonus(10, '¡Racha de 30 días!');
    }
  },

  update() {
    const lv = this.level();
    const kmEl = Utils.el('tb-km');
    const dayEl = Utils.el('tb-days');
    if (kmEl) { kmEl.textContent = lv.ico + ' ' + this.fmt(); kmEl.style.display = ''; }
    if (dayEl && this.streak > 0) { dayEl.textContent = '📅 ' + this.streak; dayEl.style.display = ''; }
  }
};

          <div>🔥 Racha 7 días<br><span style="color:var(--amber);font-weight:600">+3 km</span></div>
          <div>⭐ Racha 30 días<br><span style="color:var(--amber);font-weight:600">+10 km</span></div>
        </div>
      </div>`
  });
}

// ── Stars ─────────────────────────────────────────────────────────────────────
function initStars() {
  const canvas = Utils.el('stars-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let stars = [], shooting = null;
  function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    stars = Array.from({length:200}, () => ({
      x:Math.random()*canvas.width, y:Math.random()*canvas.height*.8,
      r:Math.random()*1.4+.2, o:Math.random()*.7+.3,
      sp:Math.random()*.015+.005, ph:Math.random()*Math.PI*2,
      c:Math.random()>.85?'#c8d8ff':'#ffffff'
    }));
  }
  function spawnShooting() {
    shooting={x:Math.random()*canvas.width*.7,y:Math.random()*canvas.height*.3,
      vx:6+Math.random()*4,vy:3+Math.random()*2,len:80+Math.random()*60,life:1};
  }
  function draw() {
    const isLightMode = document.body.getAttribute('data-theme')==='light';
    if(isLightMode){
      // Light mode: snow particles in global canvas too
      ctx.clearRect(0,0,canvas.width,canvas.height);
      const tSnow=Date.now()/1000;
      stars.forEach(s=>{
        s.y+=s.sp*35; s.x+=Math.sin(tSnow*s.sp*3+s.ph)*0.4;
        if(s.y>canvas.height+10){s.y=-10;s.x=Math.random()*canvas.width;}
        ctx.globalAlpha=s.o*0.5; ctx.fillStyle='#c8dcf0';
        ctx.font=(s.r*7+4)+'px serif'; ctx.fillText('❄',s.x,s.y);
      });
      ctx.globalAlpha=1; requestAnimationFrame(draw); return;
    }
    ctx.clearRect(0,0,canvas.width,canvas.height);
    const t=Date.now()/1000;
    stars.forEach(s=>{
      ctx.globalAlpha=s.o*(0.6+0.4*Math.sin(t*s.sp*10+s.ph));
      ctx.fillStyle=s.c; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
    });
    if(shooting){
      shooting.x+=shooting.vx; shooting.y+=shooting.vy; shooting.life-=.025;
      if(shooting.life>0){
        const g=ctx.createLinearGradient(shooting.x-shooting.vx*12,shooting.y-shooting.vy*12,shooting.x,shooting.y);
        g.addColorStop(0,'rgba(255,255,255,0)'); g.addColorStop(1,`rgba(200,220,255,${shooting.life*.8})`);
        ctx.globalAlpha=shooting.life; ctx.strokeStyle=g; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(shooting.x-shooting.vx*12,shooting.y-shooting.vy*12);
        ctx.lineTo(shooting.x,shooting.y); ctx.stroke();
      } else {shooting=null;}
    }
    ctx.globalAlpha=.04+.02*Math.sin(t*.3);
    const ag=ctx.createLinearGradient(0,0,canvas.width,canvas.height*.4);
    ag.addColorStop(0,'transparent'); ag.addColorStop(.3,'rgba(80,200,160,.6)');
    ag.addColorStop(.6,'rgba(100,80,220,.4)'); ag.addColorStop(1,'transparent');
    ctx.fillStyle=ag; ctx.fillRect(0,0,canvas.width,canvas.height*.5);
    ctx.globalAlpha=1; requestAnimationFrame(draw);
  }
  window.addEventListener('resize',resize); resize(); draw();
  setInterval(spawnShooting,4000+Math.random()*3000); setTimeout(spawnShooting,1500); setTimeout(spawnShooting,8000);
}
